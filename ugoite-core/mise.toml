[env]
_.python.venv = { path = ".venv" }
UV_PYTHON = "3.13"
CARGO_TARGET_DIR = "../target/rust"

[tasks.install]
run = "uv sync --locked"
description = "Install dependencies"

[tasks.build]
run = [
	"python -c \"import pathlib; [p.unlink() for p in pathlib.Path('ugoite_core').glob('_ugoite_core.*.so')]\"",
	"RUSTFLAGS=\"-C debuginfo=0\" CARGO_BUILD_JOBS=1 PYO3_PYTHON=\"$(command -v python)\" uv run maturin develop",
]
description = "Build Rust extension for local development"

[tasks."build:clean"]
run = [
	"cargo clean -p ugoite-core",
	"python -c \"import pathlib; [p.unlink() for p in pathlib.Path('ugoite_core').glob('_ugoite_core.*.so')]\"",
	"RUSTFLAGS=\"-C debuginfo=0\" CARGO_BUILD_JOBS=1 PYO3_PYTHON=\"$(command -v python)\" uv run maturin develop",
]
description = "Clean package-local artifacts and rebuild the Rust extension"

[tasks.test]
run = [
	"cargo test -j 1",
	"if [ -d tests ]; then report=\"${TMPDIR:-/tmp}/ugoite-core-pytest.$$.xml\" && trap 'rm -f \"$report\"' EXIT && uv run --with pytest --with pytest-asyncio python -m pytest -W error --junitxml=\"$report\" && python3 ../scripts/fail_on_skipped_tests.py \"$report\" \"ugoite-core tests\"; fi",
]
description = "Run Rust crate tests and Python binding tests"
depends = ["build"]

[tasks."test:no-build"]
run = [
	"cargo test -j 1",
	"if [ -d tests ]; then report=\"${TMPDIR:-/tmp}/ugoite-core-pytest.$$.xml\" && trap 'rm -f \"$report\"' EXIT && uv run --with pytest --with pytest-asyncio python -m pytest -W error --junitxml=\"$report\" && python3 ../scripts/fail_on_skipped_tests.py \"$report\" \"ugoite-core tests\"; fi",
]
description = "Run Rust crate tests and Python binding tests without rebuilding the editable extension"

[tasks.lint]
run = "cargo clippy && uv run ruff check ."
description = "Run Rust and Python linters"

[tasks.format]
run = "cargo fmt && uv run ruff format ."
description = "Format Rust and Python code"

[tasks.ty]
run = "uv run ty check ."
description = "Run Python type checking"
