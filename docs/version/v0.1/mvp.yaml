id: mvp
version: "0.1"
status: completed
title: "Minimum Viable Product (MVP)"
goal: >
  A working local-first knowledge management app with core features operational.
  Establish foundational architecture proving the "Local-First, AI-Native Knowledge Space" concept.
phases:
