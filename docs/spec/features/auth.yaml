# Explicit Login APIs

version: "0.1"
updated: "2026-03"
kind: auth

apis:
  - id: auth.config
    method: GET
    backend:
      path: /auth/config
      file: backend/src/app/api/endpoints/auth.py
      function: auth_config_endpoint
    frontend:
      path: /login
      file: frontend/src/routes/login.tsx
      function: LoginRoute
    ugoite_core:
      file: ugoite-core/ugoite_core/auth.py
      function: validate_totp_code

  - id: auth.login
    method: POST
    backend:
      path: /auth/login
      file: backend/src/app/api/endpoints/auth.py
      function: login_endpoint
    frontend:
      path: /login
      file: frontend/src/routes/login.tsx
      function: LoginRoute
    ugoite_core:
      file: ugoite-core/ugoite_core/auth.py
      function: mint_signed_bearer_token
    ugoite_cli:
      command: ugoite auth login
      file: ugoite-cli/src/commands/auth.rs
      function: run

  - id: auth.mock-oauth
    method: POST
    backend:
      path: /auth/mock-oauth
      file: backend/src/app/api/endpoints/auth.py
      function: mock_oauth_login_endpoint
    frontend:
      path: /login
      file: frontend/src/routes/login.tsx
      function: LoginRoute
    ugoite_core:
      file: ugoite-core/ugoite_core/auth.py
      function: mint_signed_bearer_token
    ugoite_cli:
      command: ugoite auth login --mock-oauth
      file: ugoite-cli/src/commands/auth.rs
      function: run
