# Local Development Auth APIs

version: "0.1"
updated: "2026-03"
kind: auth

apis:
  - id: auth.dev.config
    method: GET
    backend:
      path: /auth/dev/config
      file: backend/src/app/api/endpoints/auth.py
      function: dev_auth_config_endpoint
    frontend:
      path: /login
      file: frontend/src/routes/login.tsx
      function: LoginRoute
    ugoite_core:
      file: ugoite-core/ugoite_core/auth.py
      function: validate_totp_code

  - id: auth.dev.login
    method: POST
    backend:
      path: /auth/dev/login
      file: backend/src/app/api/endpoints/auth.py
      function: dev_login_endpoint
    frontend:
      path: /login
      file: frontend/src/routes/login.tsx
      function: LoginRoute
    ugoite_core:
      file: ugoite-core/ugoite_core/auth.py
      function: mint_signed_bearer_token
    ugoite_cli:
      command: ugoite auth login
      file: ugoite-cli/src/commands/auth.rs
      function: run

  - id: auth.dev.mock-oauth
    method: POST
    backend:
      path: /auth/dev/mock-oauth
      file: backend/src/app/api/endpoints/auth.py
      function: dev_mock_oauth_login_endpoint
    frontend:
      path: /login
      file: frontend/src/routes/login.tsx
      function: LoginRoute
    ugoite_core:
      file: ugoite-core/ugoite_core/auth.py
      function: mint_signed_bearer_token
    ugoite_cli:
      command: ugoite auth login --mock-oauth
      file: ugoite-cli/src/commands/auth.rs
      function: run
