# Features Registry (API-level)

# The registry is intentionally API-operation oriented (not file oriented).
# Each operation is described with the columns:
# - backend: includes path, file definition location, and function name
# - frontend: includes path, file definition location, and function name
# - ugoite_core: includes file and function name
# - ugoite_cli: optional; when present it includes command, file, and function name
# - linked_requirements: requirement categories that surface through the feature area

version: "0.2"
updated: "2026-01"

conventions:
  canonical_path: Backend HTTP path.
  frontend_path_prefix: none
  columns:
    - method
    - backend.path
    - backend.file
    - backend.function
    - frontend.path
    - frontend.file
    - frontend.function
    - ugoite_core.file
    - ugoite_core.function
    - ugoite_cli.command (optional)
    - ugoite_cli.file (optional)
    - ugoite_cli.function (optional)

files:
  - kind: spaces
    file: spaces.yaml
    linked_requirements:
      - REQCAT-STORAGE
      - REQCAT-API
  - kind: preferences
    file: preferences.yaml
    linked_requirements:
      - REQCAT-STORAGE
      - REQCAT-API
  - kind: entries
    file: entries.yaml
    linked_requirements:
      - REQCAT-ENTRY
      - REQCAT-API
  - kind: forms
    file: forms.yaml
    linked_requirements:
      - REQCAT-FORM
      - REQCAT-API
  - kind: assets
    file: assets.yaml
    linked_requirements:
      - REQCAT-ASSET
      - REQCAT-API
  - kind: auth
    file: auth.yaml
    linked_requirements:
      - REQCAT-SECURITY
      - REQCAT-API
  - kind: search
    file: search.yaml
    linked_requirements:
      - REQCAT-SEARCH
      - REQCAT-API
  - kind: sql
    file: sql.yaml
    linked_requirements:
      - REQCAT-SEARCH
      - REQCAT-API
      - REQCAT-FORM
