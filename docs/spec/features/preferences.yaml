# Portable user preference APIs

version: "0.1"
updated: "2026-03"
kind: preferences

apis:
  - id: preferences.me.get
    method: GET
    backend:
      path: /preferences/me
      file: backend/src/app/api/endpoints/preferences.py
      function: get_my_preferences_endpoint
    frontend:
      path: /spaces/{space_id}/settings
      file: frontend/src/routes/spaces/[space_id]/settings.tsx
      function: SpaceSettingsRoute
    ugoite_core:
      file: ugoite-core/src/preferences.rs
      function: get_user_preferences
    ugoite_cli:
      command: ugoite config show
      file: ugoite-cli/src/commands/config.rs
      function: run

  - id: preferences.me.patch
    method: PATCH
    backend:
      path: /preferences/me
      file: backend/src/app/api/endpoints/preferences.py
      function: patch_my_preferences_endpoint
    frontend:
      path: /spaces/{space_id}/settings
      file: frontend/src/routes/spaces/[space_id]/settings.tsx
      function: SpaceSettingsRoute
    ugoite_core:
      file: ugoite-core/src/preferences.rs
      function: patch_user_preferences
    ugoite_cli:
      command: ugoite config set
      file: ugoite-cli/src/commands/config.rs
      function: run
