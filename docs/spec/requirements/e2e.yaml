  - POL-009
  linked_specifications:
  - SPEC-TESTING-STRATEGY
  - SPEC-TESTING-CICD
  - SPEC-UI-OVERVIEW
  id: REQ-E2E-005
  title: Docsite Mobile Navigation Usability
  description: 'Docsite mobile view MUST provide an uncluttered reading layout and

    expose global/document navigation via a modern drawer interaction instead of

    stacking the full sidebar above content.

    '
  related_spec:
  - ui/README.md
  priority: high
  status: implemented
  tests:
    e2e:
    - file: e2e/docsite-mobile-nav.test.ts
      tests:
      - 'REQ-E2E-005: mobile nav opens as drawer and keeps reading area uncluttered'
      - 'REQ-E2E-005: mobile nav closes by escape and link tap'
      - 'REQ-E2E-005: mobile nav closes by overlay click'
- set_id: REQCAT-E2E
  source_file: requirements/e2e.yaml
  scope: End-to-end confidence and cross-layer behavior requirements.
  linked_policies:
  - POL-005
  - POL-006
  - POL-008
  - POL-009
  linked_specifications:
  - SPEC-TESTING-STRATEGY
  - SPEC-TESTING-CICD
  - SPEC-UI-OVERVIEW
  id: REQ-E2E-006
  title: Docsite Internal Link Integrity
  description: 'Docsite internal page transitions and page-discovered links MUST resolve

    without 404 responses, including deployments that use a non-root base path.

    '
  related_spec:
  - testing/strategy.md
  priority: high
  status: implemented
  tests:
    e2e:
    - file: e2e/docsite-links.test.ts
      tests:
      - 'REQ-E2E-006: docsite internal page links resolve without 404s'
    vitest:
    - file: docsite/src/lib/base-path.test.ts
      tests:
      - 'REQ-E2E-006: withBasePath preserves external links and prefixes internal routes'
      - 'REQ-E2E-006: withBasePath keeps configured non-root base paths stable'
    - file: docsite/src/lib/doc-links.test.ts
      tests:
      - 'REQ-E2E-006: resolveDocHref preserves safe external targets and rejects unsupported schemes'
      - 'REQ-E2E-006: resolveDocHref resolves absolute docsite and application routes against the configured base path'
      - 'REQ-E2E-006: resolveDocHref resolves relative docs and repository source links without leaking outside the base path'
    - file: docsite/src/lib/navigation.test.ts
      tests:
      - 'REQ-E2E-006: navigation helpers build child docsite links from spec data'
      - 'REQ-E2E-006: navigation helpers tolerate missing child anchors without mutating shared nav state'
