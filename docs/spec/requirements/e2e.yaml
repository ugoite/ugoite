  id: REQ-E2E-003
  title: Theme-aware UI Flows
  description: 'The UI MUST support core space workflows across all supported themes and

    color modes, including navigation, query flows, and entry detail access.

    '
  related_spec:
  - ui/README.md
  - tasks/tasks.md#phase-7-5-uiの洗練化-追加
  priority: high
  status: implemented
  tests:
    e2e:
    - file: e2e/ui-themes.test.ts
      tests:
      - 'REQ-E2E-003: UI flows work in materialize theme'
      - 'REQ-E2E-003: UI flows work in classic theme'
      - 'REQ-E2E-003: UI flows work in pop theme'
- set_id: REQCAT-E2E
  source_file: requirements/e2e.yaml
  scope: End-to-end confidence and cross-layer behavior requirements.
  linked_policies:
  - POL-005
  - POL-006
  - POL-008
  - POL-009
  linked_specifications:
  - SPEC-TESTING-STRATEGY
  - SPEC-TESTING-CICD
  - SPEC-UI-OVERVIEW
  id: REQ-E2E-004
  title: Dynamic Navigation Stability
  description: 'Frontend route traversal across internal links and transitions MUST not

    produce browser console errors, runtime page errors, or SolidJS fallback

    error screens.

    '
  related_spec:
  - testing/strategy.md
  priority: high
  status: implemented
  tests:
    e2e:
    - file: e2e/navigation.test.ts
      tests:
      - 'REQ-E2E-004: dynamic traversal has no console or SolidJS errors'
    - file: e2e/ui-pages-screenshots.test.ts
      tests:
      - 'REQ-E2E-004: export screenshots for all UI page specs'
    - file: e2e/public-pages.test.ts
      tests:
      - 'REQ-E2E-004: public pages avoid auth-only portable preference requests'
- set_id: REQCAT-E2E
  source_file: requirements/e2e.yaml
  scope: End-to-end confidence and cross-layer behavior requirements.
  linked_policies:
  - POL-005
