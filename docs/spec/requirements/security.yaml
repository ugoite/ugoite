      - test_audit_logs_authorization_denial
    - file: ugoite-core/tests/test_audit.py
      tests:
      - test_audit_appends_and_lists_events
      - test_audit_detects_chain_tampering
- set_id: REQCAT-SECURITY
  source_file: requirements/security.yaml
  scope: Security controls, integrity protections, and isolation requirements.
  linked_policies:
  - POL-003
  - POL-004
  - POL-010
  - POL-011
  linked_specifications:
  - SPEC-SECURITY-OVERVIEW
  - SPEC-SECURITY-SANDBOX
  - SPEC-ARCH-INTERFACE
  id: REQ-SEC-009
  title: Service Accounts and Scoped API Keys for Automation
  description: 'Automation access MUST be provided by explicit service accounts

    with least-privilege action scopes. API keys MUST support create/list/revoke/rotate

    workflows with one-time secret reveal, and revoked keys MUST fail authentication

    immediately across REST/MCP channels. Key usage MUST be audit-visible.

    '
  related_spec:
  - security/overview.md
  - api/rest.md#authentication
  - api/mcp.md#security-model
  priority: high
  status: implemented
  tests:
    pytest:
    - file: ugoite-core/tests/test_service_accounts.py
      tests:
      - test_service_account_scopes_are_enforced
      - test_service_account_revoked_key_is_rejected
      - test_service_account_key_usage_is_audit_logged
    - file: backend/tests/test_service_accounts.py
      tests:
      - test_service_account_scopes_and_revocation_flow
    - file: ugoite-cli/tests/test_cli_endpoint_routing.rs
      tests:
      - test_space_service_account_create_routes_to_backend
- set_id: REQCAT-SECURITY
  source_file: requirements/security.yaml
  scope: Security controls, integrity protections, and isolation requirements.
  linked_policies:
  - POL-003
  - POL-004
  - POL-010
  - POL-011
  linked_specifications:
  - SPEC-SECURITY-OVERVIEW
  - SPEC-SECURITY-SANDBOX
  - SPEC-ARCH-INTERFACE
  id: REQ-SEC-010
  title: Credentialed CORS Allowlist
  description: 'Credentialed browser access MUST use explicit CORS origin, method,

    and request-header allowlists. Wildcard origin configuration MUST be rejected

    and request-header allowlists. Preflight requests that ask for methods or

    headers outside the allowlist MUST be rejected. Wildcard origin configuration

    MUST be rejected when remote access is enabled.

    '
  related_spec:
  - security/overview.md
  priority: high
  status: implemented
  tests:
    pytest:
    - file: backend/tests/test_api.py
      tests:
      - test_cors_req_sec_010_preflight_allows_explicit_method_and_header_lists
      - test_cors_req_sec_010_rejects_wildcard_origin_config_when_remote_enabled
      - test_cors_req_sec_010_preflight_rejects_disallowed_method_and_header
- set_id: REQCAT-SECURITY
  source_file: requirements/security.yaml
  scope: Security controls, integrity protections, and isolation requirements.
  linked_policies:
  - POL-003
  - POL-004
  - POL-010
  - POL-011
  linked_specifications:
  - SPEC-SECURITY-OVERVIEW
  - SPEC-SECURITY-SANDBOX
  - SPEC-ARCH-INTERFACE
  id: REQ-SEC-011
  title: CLI Remote Endpoint Transport Safety
  description: 'CLI server-backed endpoint configuration MUST reject non-loopback

    cleartext `http://` URLs, keep loopback cleartext URLs available for local

    development, warn when legacy insecure remote endpoints are still saved,

    and refuse to treat such endpoints as active topology before any credentialed

    request can be sent to them.

    '
  related_spec:
  - security/overview.md
  priority: high
  status: implemented
  tests:
    rust:
    - file: ugoite-cli/tests/test_endpoint_config.rs
      tests:
      - test_config_set_req_sec_011_rejects_non_loopback_cleartext_urls
      - test_config_set_req_sec_011_allows_loopback_cleartext_urls
      - test_config_current_req_sec_011_warns_about_saved_non_loopback_cleartext_url
      - test_space_list_req_sec_011_rejects_saved_non_loopback_cleartext_endpoint
    - file: ugoite-cli/tests/test_cli_req_sec_011_endpoint_transport.rs
      tests:
      - test_cli_req_sec_011_config_set_rejects_non_loopback_cleartext_api_urls
      - test_cli_req_sec_011_config_set_rejects_non_loopback_cleartext_backend_urls
      - test_cli_req_sec_011_config_set_allows_loopback_cleartext_development_endpoints
      - test_cli_req_sec_011_config_set_allows_ipv6_loopback_cleartext_development_endpoints
      - test_cli_req_sec_011_config_set_rejects_non_loopback_cleartext_ipv6_api_urls
      - test_cli_req_sec_011_config_current_warns_about_legacy_insecure_remote_endpoints
      - test_cli_req_sec_011_server_backed_commands_refuse_legacy_insecure_remote_endpoints_before_requests_are_sent
