category: Security
prefix: REQ-SEC
requirements:
- set_id: REQCAT-SECURITY
  source_file: requirements/security.yaml
  scope: Security controls, integrity protections, and isolation requirements.
  linked_policies:
  - POL-003
  - POL-004
  - POL-010
  - POL-011
  linked_specifications:
  - SPEC-SECURITY-OVERVIEW
  - SPEC-SECURITY-SANDBOX
  - SPEC-ARCH-INTERFACE
  id: REQ-SEC-001
  title: Localhost Binding
  description: 'API binds to 127.0.0.1 only by default. Remote access requires

    explicit UGOITE_ALLOW_REMOTE=true environment variable.

    When `UGOITE_TRUST_PROXY_HEADERS=true`, forwarded client headers MUST only

    be honored from trusted loopback proxy peers so direct remote clients cannot

    spoof loopback access.

    Source Docker Compose defaults MUST keep browser access loopback-only, and

    containerized dev-auth packaging MUST avoid repository-known signing or proxy

    secrets when network exposure is possible.

    '
  related_spec:
  - security/overview.md
  priority: high
  status: implemented
  tests:
    pytest:
    - file: backend/tests/test_api.py
      tests:
      - test_middleware_blocks_remote_clients
      - test_middleware_blocks_remote_clients_when_proxy_headers_trusted
      - test_middleware_blocks_spoofed_loopback_forwarded_for_when_proxy_headers_trusted
    - file: backend/tests/test_auth.py
      tests:
      - test_resolve_client_host_trusted_proxy
      - test_resolve_client_host_empty_forwarded
      - test_resolve_client_host_ignores_untrusted_forwarded_for
    - file: backend/tests/test_dev_auth.py
      tests:
      - test_dev_auth_req_sec_001_startup_derives_bearer_env_from_signing_material
    - file: docs/tests/test_guides.py
      tests:
      - test_docs_req_sec_001_source_compose_requires_unique_dev_auth_secrets
    - file: docs/tests/test_helm_chart.py
      tests:
      - test_docs_req_sec_001_helm_chart_requires_unique_auth_secrets
