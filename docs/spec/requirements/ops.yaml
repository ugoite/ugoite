  id: REQ-OPS-003
  title: Governance Taxonomy Link Integrity
  description: 'Governance taxonomy YAMLs (philosophy, policies, requirements with

    embedded set metadata, and flat specifications catalog) MUST exist under

    docs/spec and maintain bidirectional references across policy↔requirement,

    policy↔specification, and requirement↔specification links with no dangling

    items.

    '
  related_spec:
  - philosophy/foundation.yaml
  - policies/policies.yaml
  - requirements/ops.yaml
  - specifications.yaml
  priority: medium
  status: implemented
  tests:
    pytest:
    - file: docs/tests/test_spec_governance.py
      tests:
      - test_req_ops_003_governance_files_exist
      - test_req_ops_003_ids_and_links_are_structurally_valid
      - test_req_ops_003_bidirectional_links_hold
