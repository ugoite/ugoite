  description: 'All Tests Status MUST aggregate curated code-quality workflow health,

    exclude release/publish automation workflows (at minimum `Release CI` and

    `Release Publish`) so auxiliary release failures do not mark branch health

    red, and avoid deprecated wait-action runtimes in the rollup path.

    '
  related_spec:
