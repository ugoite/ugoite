  id: REQ-OPS-011
  title: Rust Target Cache Discipline
  description: 'Local Rust build and test tasks MUST share a bounded target root,

    keep the default ugoite-core local build path incremental, reuse one

    editable ugoite-core build inside root `mise run test` before backend and

    ugoite-core test execution, keep the default ugoite-cli local test path

    incremental, and expose explicit clean rebuild/test/cleanup commands when

    stale artifacts need a

    destructive reset. Rust CI MUST use

    the same shared target root so repeated ugoite-core and ugoite-cli

    development does not balloon target caches into tens of gigabytes.

    '
  related_spec:
  - ../README.md
  - testing/ci-cd.md
  priority: medium
  status: implemented
  tests:
    pytest:
    - file: docs/tests/test_guides.py
      tests:
      - test_docs_req_ops_011_rust_target_cache_discipline_declared
