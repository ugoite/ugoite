  id: REQ-OPS-019
  title: Explicit Mise Monorepo Config Roots
  description: 'The root `mise.toml` MUST declare explicit `[monorepo].config_roots`

    for the package-level mise configurations so top-level developer entrypoints

    no longer rely on deprecated automatic monorepo discovery or emit recurring

    warning noise during normal `mise run ...` usage.

    '
  related_spec:
  - testing/ci-cd.md
  priority: medium
  status: implemented
  tests:
    pytest:
