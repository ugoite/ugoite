  id: REQ-OPS-010
  title: Frontend Local Dev Proxy Readiness
  description: 'The frontend dev task MUST wait for the local backend health endpoint

    before starting the UI dev server so

    authenticated `/api` requests such as `/spaces` do not surface transient

    local-startup 502 errors.

    '
  related_spec:
  - ../guide/local-dev-auth-login.md
  - architecture/frontend-backend-interface.md#error-handling-standards
  priority: medium
  status: implemented
  tests:
