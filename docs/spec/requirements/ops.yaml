  id: REQ-OPS-009
  title: Release Automation Bootstrap and PR Permissions
  description: 'Release automation MUST keep its bootstrap version metadata aligned at

    `0.0.1`, bound pre-release-please history with `bootstrap-sha`, use a

    dedicated `RELEASE_PLEASE_TOKEN` auth path for release PR creation, and

    no-op cleanly when that secret is unavailable instead of failing on

    repository-level `GITHUB_TOKEN` PR permission limits.

    '
  related_spec:
  - testing/ci-cd.md
  priority: medium
  status: implemented
  tests:
    pytest:
    - file: docs/tests/test_guides.py
      tests:
      - test_docs_req_ops_009_release_ci_bootstrap_and_permissions_declared
