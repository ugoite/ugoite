  description: 'The repository MUST expose a root developer workflow for loading

    local sample data without requiring contributors to memorize the lower-level

    CLI invocation. The workflow MUST document safe defaults, override controls,

    and the underlying scenario-listing command so seeded dev spaces stay

    discoverable and predictable.

    '
  related_spec:
  - testing/ci-cd.md
  priority: medium
  status: implemented
  tests:
