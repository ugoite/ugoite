  description: 'Release Publish MUST push the official backend and frontend images

    to GHCR with deterministic stable/alpha/beta tags aligned to the requested

    SemVer, and repository/docs guidance MUST expose a quick-start path for

    pulling and running those release images without rebuilding from source.

    '
