  - SPEC-ARCH-STACK
  - SPEC-PRODUCT-METRICS
  id: REQ-OPS-018
  title: CLI Release Binaries and Install Path
  description: 'Release Publish MUST create predictable CLI archives for the supported

    release platforms (at minimum Linux x86_64 + arm64, macOS x86_64, and

    macOS arm64), attach them to the GitHub Release, and keep a maintained

    one-liner install path plus quick-start documentation so users can run

    `ugoite --help` without cloning and building from source.

    '
  related_spec:
  - testing/ci-cd.md
  - ../guide/cli.md
  - ../README.md
  priority: medium
  status: implemented
  tests:
    pytest:
