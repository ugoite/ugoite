  - SPEC-TESTING-CICD
  - SPEC-TESTING-STRATEGY
  - SPEC-ARCH-STACK
  - SPEC-PRODUCT-METRICS
  id: REQ-OPS-015
  title: Local Dev Auth Mode Selection
  description: 'Local development tooling MUST expose explicit login flows instead

    of starting the stack already authenticated. `passkey-totp` MUST prompt for

    a local username plus current 2FA code during setup, store only the reusable

    login context with owner-only permissions, require a passkey-bound local

    context in addition to the 2FA code during explicit browser/CLI login, and

    complete an explicit login step before a bearer token is issued. `mock-oauth`

    MAY remain as an explicit development-only OAuth-style login path, but no dev

    mode may pre-inject a bearer token into the running stack. The standard

    devcontainer setup MUST include `oathtool` so passkey-totp flows remain

    reproducible inside the canonical contributor environment. README, docsite

    setup pages, and developer-facing auth guidance MUST point back to one

    canonical auth-aware guide instead of duplicating mode-specific startup

    instructions.

    '
  related_spec:
  - ../guide/local-dev-auth-login.md
  - ../guide/env-matrix.md
  - ../README.md
  priority: medium
  status: implemented
  tests:
    pytest:
    - file: docs/tests/test_guides.py
      tests:
      - test_docs_req_ops_015_local_dev_auth_docs_cover_manual_modes
      - test_docs_req_ops_015_auth_profile_docs_describe_mode_and_next_step
      - test_docs_req_ops_015_dev_auth_script_declares_manual_modes
      - test_docs_req_ops_015_mock_oauth_startup_avoids_terminal_prompts
    - file: backend/tests/test_dev_auth.py
      tests:
      - test_dev_auth_req_ops_015_config_exposes_passkey_totp_mode
      - test_dev_auth_req_ops_015_passkey_totp_login_issues_signed_token
      - test_dev_auth_req_ops_015_passkey_totp_login_rejects_replayed_code
      - test_dev_auth_req_ops_015_mock_oauth_login_issues_signed_token
      - test_dev_auth_req_ops_015_startup_bootstraps_admin_space
      - test_dev_auth_req_ops_015_passkey_login_rejects_missing_passkey_context
      - test_dev_auth_req_ops_015_passkey_login_rejects_invalid_passkey_context
      - test_dev_auth_req_ops_015_passkey_login_rejects_blank_passkey_context
      - test_dev_auth_req_ops_015_passkey_login_requires_configured_passkey_context
      - test_dev_auth_req_ops_015_allows_trusted_proxy_token
      - test_dev_auth_req_ops_015_rejects_invalid_trusted_proxy_token
      - test_dev_auth_req_ops_015_rejects_missing_trusted_proxy_token
      - test_dev_auth_req_ops_015_rejects_unknown_client_host
    - file: ugoite-core/tests/test_auth.py
      tests:
      - test_validate_totp_code_req_ops_015_accepts_current_code
      - test_validate_totp_code_req_ops_015_accepts_unpadded_secret
      - test_validate_totp_code_req_ops_015_rejects_replayed_code
      - test_validate_totp_code_req_ops_015_accepts_next_time_step_after_replay
    vitest:
    - file: frontend/src/routes/login.test.tsx
      tests:
      - 'REQ-OPS-015: signs in with passkey-totp and stores a browser auth cookie'
      - 'REQ-OPS-015: uses explicit mock-oauth browser login without startup auth injection'
      - 'REQ-OPS-015: visiting login preserves an existing browser auth cookie until re-auth completes'
      - 'REQ-OPS-015: shows first-run passkey guidance with the canonical local auth guide'
      - 'REQ-OPS-015: keeps first-run passkey guidance out of mock-oauth login'
      - 'REQ-OPS-015: keeps auth-config recovery guidance compatible with source and published browser flows'
    - file: frontend/src/lib/api.test.ts
      tests:
      - 'REQ-OPS-015: forwards SSR auth headers to local auth requests'
      - 'REQ-OPS-015: preserves explicit request auth headers during SSR'
      - 'REQ-OPS-015: skips SSR auth forwarding without a request event'
      - 'REQ-OPS-015: uses FRONTEND_TEST_ORIGIN for the frontend test API base'
      - 'REQ-OPS-015: uses FRONTEND_URL for the SSR API origin when frontend origin env vars are unset'
      - 'REQ-OPS-015: falls back to the default SSR origin when no frontend origin env is configured'
      - 'REQ-OPS-015: does not derive the SSR API origin from the incoming request'
    - file: frontend/src/lib/frontend-origin.test.ts
      tests:
      - 'REQ-OPS-015: falls back to the default frontend test origin when process env is unavailable'
      - 'REQ-OPS-015: trims and applies FRONTEND_TEST_ORIGIN overrides'
      - 'REQ-OPS-015: prefers runtime frontend origin env vars in documented order'
    - file: frontend/src/test/mocks/handlers.test.ts
      tests:
      - 'REQ-OPS-015: MSW handlers honor FRONTEND_TEST_ORIGIN'
    - file: frontend/src/lib/auth-api.test.ts
      tests:
      - 'REQ-OPS-015: surfaces local auth config and login response errors clearly'
      - 'REQ-OPS-015: writes and clears browser auth cookies with explicit expiry'
      - 'REQ-OPS-015: writes and clears browser auth cookies with explicit expiry safely when document is unavailable'
      - 'REQ-OPS-015: no-ops when cookie descriptors are unavailable'
    - file: frontend/src/routes/spaces/index.test.tsx
      tests:
      - 'REQ-OPS-015: redirects unauthenticated users to the explicit login route'
    rust:
    - file: ugoite-cli/tests/test_auth.rs
      tests:
      - test_cli_auth_profile_req_ops_015_reports_core_mode_without_backend_credentials
      - test_cli_auth_profile_req_ops_015_reports_backend_mode_without_credentials
      - test_cli_auth_profile_req_ops_015_reports_masked_backend_credentials
      - test_cli_auth_profile_req_ops_015_reports_api_mode_with_api_key
      - test_cli_auth_login_req_ops_015_posts_dev_login_and_prints_export
      - test_cli_auth_login_req_ops_015_shell_escapes_bearer_token_exports
      - test_cli_auth_login_req_ops_015_quotes_empty_bearer_token_exports
      - test_cli_auth_login_req_ops_015_help_scopes_mock_oauth_proxy_token_requirement
    e2e:
    - file: e2e/smoke.test.ts
      tests:
      - 'REQ-OPS-015: visiting login does not clear an existing browser auth cookie'
