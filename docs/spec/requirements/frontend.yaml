  id: REQ-FE-003
  title: Persist Space Selection
  description: 'Save selected space in portable user preferences and restore it across

    sessions.

    Frontend clients MUST prefer portable selected-space preferences loaded from

    `/preferences/me` and MAY use localStorage only as an offline or pre-initialization

    fallback and migration layer.

    '
  related_spec:
  - architecture/overview.md
  priority: medium
  status: implemented
  tests:
    vitest:
    - file: frontend/src/lib/space-store.test.ts
      tests:
      - should restore persisted space selection
      - should select space and persist choice
      - 'REQ-FE-003: should prefer portable selected space preference'
    - file: frontend/src/lib/preferences-store.test.ts
      tests:
      - 'REQ-FE-003: initializes selected space from local fallback and migrates portable storage'
      - 'REQ-FE-003: authenticated routes hydrate portable preferences through route-aware initialization'
      - 'REQ-FE-003: public routes keep initialized remote portable preferences'
      - 'REQ-FE-003: reuses an in-flight portable preferences initialization'
      - 'REQ-FE-003: returns cached portable preferences after initialization'
      - 'REQ-FE-003: skips empty portable preference patches'
