  id: REQ-FE-044
  title: Frontend multilingual dictionary and locale switching
  description: 'Frontend UI labels MUST support dictionary-based localization loaded from

    the shared workspace dictionary, with at least English and Japanese.

    Users MUST be able to switch language from the theme/settings menu and

    the selected locale MUST persist in portable user preferences loaded from

    `/preferences/me`, with localStorage retained only as a fallback and migration

    layer.

    '
  related_spec:
  - architecture/frontend-backend-interface.md
  - tasks/tasks.md#phase-7-5-ui-polish-added
  priority: medium
  status: implemented
  tests:
    vitest:
    - file: frontend/src/lib/i18n.test.ts
      tests:
      - switches locale and translates labels
      - applies locale attributes on initialize
      - 'REQ-FE-044: interpolates localized placeholders'
    - file: frontend/src/components/create-dialogs.test.tsx
      tests:
      - 'REQ-FE-044: localizes create-form dialog copy in Japanese'
      - 'REQ-FE-044: localizes create-entry dialog copy in Japanese'
    - file: frontend/src/components/AssetUploader.test.tsx
      tests:
      - 'REQ-FE-044: localizes asset uploader controls in Japanese'
    - file: frontend/src/components/ListPanel.test.tsx
      tests:
      - 'REQ-FE-044: localizes entry list controls and empty state in Japanese'
    - file: frontend/src/lib/preferences-store.test.ts
      tests:
      - 'REQ-FE-044: initializes locale from portable preferences and refreshes local fallback'
      - 'REQ-FE-044: public routes apply local locale without remote preference fetch'
    - file: frontend/src/routes/index.test.tsx
      tests:
      - 'REQ-FE-044: localizes home route CTA copy in Japanese'
    - file: frontend/src/routes/about.test.tsx
      tests:
      - 'REQ-FE-044: localizes about route copy in Japanese'
    - file: frontend/src/lib/preferences-api.test.ts
      tests:
      - 'REQ-FE-044: surfaces string detail on portable preference load failure'
    - file: frontend/src/components/ThemeMenu.test.tsx
      tests:
      - shows language options in settings menu
      - switches locale when language changes
      - 'REQ-FE-044: persists locale via portable preferences with local fallback'
    - file: frontend/src/routes/spaces/[space_id]/dashboard.test.tsx
      tests:
      - 'REQ-FE-044: dashboard localizes main workflow copy in Japanese'
      - 'REQ-FE-044: dashboard localizes first-run onboarding copy in Japanese'
    - file: frontend/src/routes/spaces/[space_id]/entries/index.test.tsx
      tests:
      - 'REQ-FE-044: localizes entries route CTA copy in Japanese'
    - file: frontend/src/routes/spaces/[space_id]/forms/index.test.tsx
      tests:
