  description: 'Frontend theme, color mode, and primary color selections MUST persist

    in portable user preferences loaded from `/preferences/me`.

    Theme interactions MUST continue to maintain localStorage only as a fallback

    and migration layer so the UI remains stable before portable preferences finish

    loading or when the backend is temporarily unavailable.

    '
