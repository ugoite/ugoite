      - 'REQ-FE-059: migrates missing primary color from local fallback'
      - 'REQ-FE-059: public routes apply local theme preferences without remote fetch'
    - file: frontend/src/lib/preferences-api.test.ts
      tests:
      - 'REQ-FE-059: stringifies structured detail on portable preference update failure'
      - 'REQ-FE-059: falls back to status text when portable preference errors are not JSON'
