  id: REQ-FE-065
  title: Searchable Row Reference Picker
  description: 'Create-entry flows for `row_reference` fields MUST let users search

    and choose target-form entries by human-readable metadata while still storing

    the stable referenced `entry_id` in the generated entry content. Web and chat

    modes MUST block submission when a user typed a row-reference search but has

    not actually selected a saved target entry yet.

    '
  related_spec:
  - architecture/frontend-backend-interface.md
  - data-model/overview.md#content-column-types--markdown-parsing
  priority: medium
  status: implemented
  tests:
    e2e:
    - file: e2e/entries.test.ts
      tests:
      - 'REQ-FE-065: create-entry uses a searchable row_reference picker and stores the selected entry_id'
    vitest:
    - file: frontend/src/components/create-dialogs.test.tsx
      tests:
      - 'REQ-FE-065: row_reference fields offer a searchable picker while storing stable entry ids'
      - 'REQ-FE-065: chat mode stores the selected row_reference entry id'
      - 'REQ-FE-065: row_reference searches must resolve to a saved entry before submit'
      - 'REQ-FE-065: row_reference pickers surface load errors when reference lookup fails'
      - 'REQ-FE-065: clearing a selected row_reference removes the saved entry id'
      - 'REQ-FE-065: row_reference fields without target_form keep raw text entry'
      - 'REQ-FE-065: row_reference pickers fall back to entry ids and sort duplicate titles by id'
    - file: frontend/src/lib/client.test.ts
      tests:
      - 'REQ-FE-065: row_reference picker options request bounded form-scoped summaries'
    - file: backend/tests/test_api.py
