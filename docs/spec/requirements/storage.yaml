  id: REQ-STO-001
  title: Storage Abstraction Using the Shared OpenDAL Runtime Layer
  description: 'System MUST route runtime I/O through the shared Rust storage abstraction.

    The current runtime adapter is OpenDAL-backed (`ugoite-core` over

    `ugoite-minimum`).

    Earlier Python `fsspec` usage is legacy context only and MUST NOT be treated

    as the canonical runtime architecture.

    No direct filesystem calls allowed outside the storage abstraction layer.

    '
  related_spec:
  - architecture/overview.md#module-responsibilities
  - stories/core.yaml#STORY-003
  priority: high
  status: implemented
  tests:
    pytest:
    - file: ugoite-cli/tests/test_space.rs
      tests:
      - test_create_space_scaffolding
      - test_create_space_s3_unimplemented
    - file: ugoite-cli/tests/test_endpoint_config.rs
      tests:
      - test_endpoint_config_roundtrip_uses_home_directory
      - test_resolve_base_url_by_mode
    - file: docs/tests/test_storage_docs.py
      tests:
      - test_docs_req_sto_001_storage_runtime_declares_opendal_current
    - file: ugoite-cli/tests/test_cli_endpoint_routing.rs
      tests:
      - test_cli_config_set_and_show
    - file: ugoite-cli/tests/test_indexer.rs
      tests:
      - test_indexer_run_once
    - file: backend/tests/test_api.py
      tests:
      - test_build_response_signature_uses_ugoite_core_storage_abstraction
    rust:
    - file: ugoite-minimum/tests/test_coverage.rs
      tests:
      - test_storage_req_sto_001_json_helpers_use_storage_abstraction
    - file: ugoite-core/tests/test_space.rs
      tests:
      - test_space_req_sto_002_create_space_scaffolding
