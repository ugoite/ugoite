  - SPEC-DM-DIRECTORY
  - SPEC-DM-OVERVIEW
  - SPEC-ARCH-DECISIONS
  id: REQ-STO-011
  title: Hashed portable user preference storage
  description: 'Portable user preferences MUST persist under `users/<sha256(user_id)>/preferences.json`

    rather than exposing raw user identifiers in storage paths.

    Missing preference files MUST resolve to a full null-valued preference object,

    and patch updates MUST merge into the stored preference document without

    recreating raw user-id directories.

    '
  related_spec:
  - architecture/overview.md
  - features/preferences.yaml
  priority: medium
  status: implemented
  tests:
    pytest:
    - file: ugoite-core/tests/test_async_bindings.py
      tests:
      - test_user_preferences_bindings
    rust:
    - file: ugoite-core/tests/test_preferences.rs
      tests:
      - test_preferences_req_sto_011_default_values
      - test_preferences_req_sto_011_patch_roundtrip_uses_hashed_user_path
