  id: REQ-STO-012
  title: Documentation-driven storage layout synchronization
  description: 'The documented storage layout MUST be machine-readable and tested

    against the files and directories that `ugoite-core` actually creates.

    Tests MUST distinguish the bootstrap scaffold created by `create_space`

    from paths that appear lazily on first use, including response-signing

    metadata and SQL session metadata.

    '
  related_spec:
  - data-model/directory-structure.md
  - data-model/directory-layout.yaml
  - data-model/file-schemas.yaml
  priority: high
  status: implemented
  tests:
    pytest:
    - file: docs/tests/test_storage_docs.py
      tests:
      - test_docs_req_sto_012_storage_layout_bootstrap_matches_runtime
      - test_docs_req_sto_012_storage_layout_lazy_paths_match_runtime_triggers
