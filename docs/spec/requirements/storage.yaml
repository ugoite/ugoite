  id: REQ-STO-007
  title: Backend IO Separation & Multi-backend Coverage
  description: 'All runtime filesystem interactions MUST remain inside the shared

    Rust storage layer, currently exercised through the OpenDAL-backed

    `ugoite-core` adapter and its CLI/backend integrations.

    Backend MUST operate correctly across multiple storage implementations

    (at least OpenDAL `fs://` and `memory://` backends) using the shared

    library.

    '
  related_spec:
  - architecture/overview.md#module-responsibilities
  - architecture/decisions.md#adr-006
  priority: high
  status: implemented
  tests:
    pytest:
    - file: docs/tests/test_storage_docs.py
      tests:
      - test_docs_req_sto_007_backend_storage_boundary_docs_match_runtime
    - file: backend/tests/test_api_memory.py
      tests:
      - test_create_space_memory
      - test_create_entry_memory
      - test_update_entry_and_search_memory
      - test_assets_memory
