  id: REQ-API-001
  title: Space CRUD
  description: 'Create, retrieve, and list spaces. `/spaces` MUST keep the default

    user workspace ahead of the reserved admin-space and identify the reserved

    admin-space explicitly for clients.

    '
  related_spec:
  - api/rest.md#spaces
  priority: high
  status: implemented
  tests:
    pytest:
    - file: backend/tests/test_api.py
      tests:
      - test_create_space
      - test_create_space_req_api_001_requires_admin_space_admin
      - test_create_space_req_api_001_rejects_reserved_admin_space_id
      - test_create_space_req_api_001_propagates_http_exception
      - test_list_spaces
      - test_list_spaces_req_api_001_admin_sees_admin_space
      - test_list_spaces_req_api_001_flags_reserved_admin_space_and_keeps_default_first
      - test_list_spaces_req_api_001_non_admin_cannot_see_admin_space
      - test_get_space
      - test_get_space_not_found
    - file: ugoite-cli/tests/test_cli_endpoint_routing.rs
      tests:
      - test_create_space_req_api_001_routes_to_backend_post_spaces
      - test_create_space_req_api_001_routes_to_api_post_spaces
    vitest:
    - file: frontend/src/lib/client.test.ts
      tests:
      - spaceApi.list
      - spaceApi.create
    e2e:
    - file: e2e/smoke.test.ts
      tests:
      - GET /spaces returns list
      - GET /spaces includes default space
