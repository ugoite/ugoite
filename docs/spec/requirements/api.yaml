  id: REQ-API-011
  title: Portable user preferences API
  description: 'The API MUST expose authenticated `GET /preferences/me` and `PATCH /preferences/me`

    operations for portable user preferences, including selected space, locale,

    UI theme, color mode, and primary color.

    The API MUST validate `selected_space_id` inputs and return explicit 500

    errors when ugoite-core preference loading or updates fail.

    '
  related_spec:
  - architecture/frontend-backend-interface.md
  - features/preferences.yaml
  priority: medium
  status: implemented
  tests:
    pytest:
    - file: backend/tests/test_preferences.py
      tests:
      - test_preferences_me_roundtrip
      - test_preferences_me_rejects_invalid_selected_space_id
      - test_preferences_me_accepts_null_selected_space_id
      - test_preferences_me_get_returns_explicit_error_on_core_failure
      - test_preferences_me_patch_returns_explicit_error_on_core_failure
