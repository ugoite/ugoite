  id: REQ-API-003
  title: MCP Resource Content Framing
  description: >-
    MCP resource responses MUST label entry content as user-supplied untrusted
    data and strip raw HTML or script-like constructs before returning JSON
    payloads to AI clients.
  related_spec:
  - api/mcp.md
  - architecture/frontend-backend-interface.md
  priority: high
  status: implemented
  tests:
    pytest:
    - file: backend/tests/test_api.py
      tests:
      - test_list_entries_mcp
    - file: backend/tests/test_mcp_sanitization.py
      tests:
      - test_sanitize_mcp_markdown_req_api_003_preserves_code_and_autolinks
      - test_sanitize_mcp_markdown_req_api_003_removes_scripts_and_comments
      - test_build_mcp_entry_list_response_req_api_003_labels_sanitized_content
      - test_sanitize_mcp_markdown_req_api_003_handles_parser_edge_cases
      - test_sanitize_mcp_markdown_req_api_003_handles_unclosed_backticks
