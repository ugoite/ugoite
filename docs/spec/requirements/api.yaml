  id: REQ-API-002
  title: Entry CRUD
  description: 'Create, retrieve, update, and delete entries.

    '
  related_spec:
  - api/rest.md#entries
  priority: high
  status: implemented
  tests:
    pytest:
    - file: backend/tests/test_api.py
      tests:
      - test_create_entry
      - test_list_entries
      - test_get_entry
      - test_update_entry
      - test_delete_entry
    vitest:
    - file: frontend/src/lib/client.test.ts
      tests:
      - entryApi.list
      - entryApi.create
      - entryApi.get
      - entryApi.update
      - entryApi.delete
    e2e:
    - file: e2e/entries.test.ts
      tests:
      - POST /spaces/default/entries creates a new entry
      - GET /spaces/default/entries returns entry list
      - PUT /spaces/default/entries/:id updates entry
      - DELETE /spaces/default/entries/:id removes entry
