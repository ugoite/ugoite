  title: Entry CRUD
  description: 'Create, retrieve, update, and delete entries.

    '
  related_spec:
  - api/rest.md#entries
  priority: high
  status: implemented
  tests:
    pytest:
    - file: backend/tests/test_api.py
      tests:
      - test_create_entry
      - test_list_entries
      - test_get_entry
      - test_update_entry
      - test_delete_entry
    - file: ugoite-cli/tests/test_cli_endpoint_routing.rs
      tests:
      - test_entry_create_req_api_002_routes_to_backend_post_entries
