  id: REQ-API-009
  title: Sample data space generation
  description: 'The API MUST provide a way to generate a sample-data space with a small

    set of input parameters (space id, scenario, entry count, seed), backed

    by ugoite-core dynamic generation.

    Backend REST exposure is currently unshipped (planned), while ugoite-core

    implementation and tests are retained for future re-exposure.

    '
  related_spec:
  - api/rest.md#spaces
  - features/spaces.yaml
  priority: medium
  status: planned
  tests:
    pytest:
    - file: ugoite-cli/tests/test_space.rs
      tests:
      - test_create_sample_space_req_api_009
    - file: ugoite-cli/tests/test_cli_endpoint_routing.rs
      tests:
      - test_space_sample_data_req_api_009_help_describes_inputs
    rust:
    - file: ugoite-core/tests/test_sample_data.rs
      tests:
      - test_sample_data_req_api_009_create_sample_space
