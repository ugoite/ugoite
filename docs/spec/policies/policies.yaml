- id: POL-014
  title: Compatibility Through Explicit Evolution
  summary: Manage change using explicit deprecation and migration guidance across layers.
  description: |
    This policy manages change through visible migration, deprecation, and
    compatibility guidance rather than silent breakage between layers. It
    protects user portability and durable automation by making evolution
    explicit for APIs, storage, frontend behavior, and operator workflows.
  linked_philosophies:
  - PHIL-001
  - PHIL-003
  linked_requirements:
