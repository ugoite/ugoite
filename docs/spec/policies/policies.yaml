- id: POL-013
  title: Spec-Driven Product Iteration
  summary: Evolve product behavior through explicit specifications before implementation drift.
  description: |
    This policy requires product evolution to move through explicit specs and
    shared documentation before implementation fragments into local decisions.
    It keeps iteration aligned with reusable rules so behavior changes remain
    reviewable, explainable, and continuously validated.
  linked_philosophies:
  - PHIL-003
