  - SPEC-QUALITY-ERROR
- id: POL-009
  title: Quality Gates Before Integration
  summary: Apply strict linting, typing, and regression gates before merging and release.
  description: |
    This policy enforces pre-integration quality gates so regressions are caught
    before they become shared product behavior. It operationalizes rule-based
    development and trusted constraints by making type checks, lint rules, and
    regression suites mandatory for change integration.
  linked_philosophies:
  - PHIL-003
  - PHIL-004
  linked_requirements:
