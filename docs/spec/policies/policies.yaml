policies:
- id: POL-001
  title: Storage and Query Portability
  summary: Keep storage and query surfaces portable and vendor-neutral.
  description: |
    This policy keeps storage layouts, SQL capabilities, and indexing contracts
    portable across backends and deployment environments. It protects user
    freedom by favoring open abstractions that can be reused, audited, and
    evolved without trapping data or query workflows inside a single provider.
  linked_philosophies:
