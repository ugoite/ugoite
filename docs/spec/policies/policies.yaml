  - SPEC-API-SURFACES
- id: POL-005
  title: CLI as First-Class Operator Surface
  summary: Use CLI workflows to keep automation explicit, inspectable, and scriptable.
  description: |
    This policy keeps automation visible and scriptable by treating the CLI as
    a first-class operational surface rather than a secondary afterthought. It
    reinforces low-node operation, reusable workflows, and durable rule-based
    automation that can be inspected directly by users and maintainers.
  linked_philosophies:
  - PHIL-001
  - PHIL-002
  - PHIL-003
