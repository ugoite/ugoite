  - SPEC-UI-PAGES
- id: POL-007
  title: Form and Entry Schema Governance
  summary: Enforce stable, typed entry/form behavior through documented schema contracts.
  description: |
    This policy stabilizes the product's structured content model through
    explicit schema contracts for forms, entries, and assets. It makes the data
    model portable and durable by ensuring that product behavior stays tied to
    documented rules instead of ad hoc field handling.
  linked_philosophies:
  - PHIL-001
  - PHIL-003
  linked_requirements:
