  - SPEC-UI-PAGES
- id: POL-008
  title: Requirement-to-Test Traceability
  summary: Require machine-readable linkage from requirement to executable tests.
  description: |
    This policy turns specifications into enforceable quality rules by requiring
    machine-readable links from requirements to tests. It strengthens trusted
    autonomy by ensuring that contributors and AI agents change behavior only
    through paths that remain continuously checkable in CI.
  linked_philosophies:
