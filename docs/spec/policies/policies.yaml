  - SPEC-API-SURFACES
- id: POL-011
  title: Security and Isolation by Default
  summary: Design for secure defaults, bounded execution, and explicit trust boundaries.
  description: |
    This policy makes secure defaults and explicit trust boundaries part of the
    baseline product architecture instead of optional hardening. It supports
    minimal runtime topology and trusted AI operation by constraining what code
    can do, where it can run, and how risk is surfaced.
  linked_philosophies:
