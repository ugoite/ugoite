  - SPEC-API-REST
- id: POL-003
  title: Minimal Node Deployment
  summary: Optimize for low-node, serverless-oriented deployments.
  description: |
    This policy keeps runtime topology intentionally small so product
    capabilities do not depend on unnecessary always-on services. It turns the
    serverless-oriented philosophy into operational guidance by preferring
    explicit, removable infrastructure over hidden long-lived dependencies.
  linked_philosophies:
  - PHIL-002
  linked_requirements:
  - REQCAT-OPS
  - REQCAT-STORAGE
  - REQCAT-SECURITY
  linked_specifications:
  - SPEC-ARCH-STACK
  - SPEC-ARCH-FUTURE
  - SPEC-TESTING-CICD
- id: POL-004
  title: Backend as Thin API Adapter
  summary: Keep backend responsibility focused on protocol and orchestration boundaries.
  description: |
    This policy limits the backend to interface translation, orchestration, and
    security boundaries instead of duplicating durable business rules. It keeps
    deployments lighter and preserves freedom to reuse the same core behavior
    across multiple operator surfaces without API-layer lock-in.
  linked_philosophies:
  - PHIL-001
  - PHIL-002
  linked_requirements:
