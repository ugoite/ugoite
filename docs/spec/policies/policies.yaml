  - SPEC-FEATURES-SQL
  - SPEC-DM-SQL-SESSIONS
- id: POL-002
  title: Rust Core as Canonical Logic Layer
  summary: Concentrate durable business logic in ugoite-core and reuse it from adapters.
  description: |
    This policy treats ugoite-core as the durable source of product logic so
    adapters do not drift into incompatible implementations. It supports
    portable architecture and continuously verifiable behavior by reusing the
    same core rules from backend, CLI, and future integrations.
  linked_philosophies:
