  - SPEC-TESTING-STRATEGY
  - SPEC-TESTING-CICD
- id: POL-006
  title: Frontend Contract Discipline
  summary: Keep frontend behavior aligned with API contracts and shared UI specifications.
  description: |
    This policy requires the frontend to follow shared contracts and documented
    UI behavior instead of inventing parallel rules in the client. It supports
    durable verification and trusted AI-assisted work by making contract drift
    visible through typed interfaces, specs, and tests.
  linked_philosophies:
  - PHIL-003
  - PHIL-004
  linked_requirements:
