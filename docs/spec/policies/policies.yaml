  - SPEC-PRODUCT-METRICS
- id: POL-010
  title: AI Under Trusted Tooling
  summary: Allow AI autonomy only inside trusted tools, validated interfaces, and audit paths.
  description: |
    This policy defines the boundary for AI-assisted work by requiring trusted
    tools, validated interfaces, and auditable execution paths. It exists to
    preserve high autonomy only where risk remains observable, reviewable, and
    constrained by explicit contracts.
  linked_philosophies:
  - PHIL-004
  linked_requirements:
