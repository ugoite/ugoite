apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ugoite.authSecretName" . }}
  labels:
    {{- include "ugoite.labels" . | nindent 4 }}
type: Opaque
stringData:
  UGOITE_DEV_SIGNING_SECRET: {{ .Values.auth.signingSecret | quote }}
  UGOITE_AUTH_BEARER_SECRETS: {{ include "ugoite.authBearerSecrets" . | quote }}
  UGOITE_DEV_AUTH_PROXY_TOKEN: {{ .Values.auth.proxyToken | quote }}
