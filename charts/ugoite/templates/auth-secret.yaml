{{- $signingSecret := required "charts/ugoite values.auth.signingSecret must be set to a unique secret" .Values.auth.signingSecret -}}
{{- $proxyToken := required "charts/ugoite values.auth.proxyToken must be set to a unique token" .Values.auth.proxyToken -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ugoite.authSecretName" . }}
  labels:
    {{- include "ugoite.labels" . | nindent 4 }}
type: Opaque
stringData:
  UGOITE_DEV_SIGNING_SECRET: {{ $signingSecret | quote }}
  UGOITE_AUTH_BEARER_SECRETS: {{ include "ugoite.authBearerSecrets" . | quote }}
  UGOITE_DEV_AUTH_PROXY_TOKEN: {{ $proxyToken | quote }}
