services:
  backend:
    image: ghcr.io/ugoite/ugoite/backend:${UGOITE_VERSION:?set UGOITE_VERSION}
    ports:
      - "127.0.0.1:${UGOITE_BACKEND_PORT:-8000}:8000"
    volumes:
      - "${UGOITE_SPACES_DIR:-./spaces}:/data"
    environment:
      - UGOITE_ROOT=/data
      # Required because the frontend container reaches the backend over the
      # private Compose bridge network; host exposure still stays on 127.0.0.1.
      - UGOITE_ALLOW_REMOTE=true
      # Keep a newcomer-facing workspace ready; admin-space stays separate in
      # the browser UI after mock-oauth login.
      - UGOITE_BOOTSTRAP_DEFAULT_SPACE=true
      # Safer default: keep the shipped manifest on passkey-totp unless an
      # operator explicitly opts into local demo auth with unique secrets.
      - UGOITE_DEV_AUTH_MODE=${UGOITE_DEV_AUTH_MODE:-passkey-totp}
      - UGOITE_DEV_USER_ID=${UGOITE_DEV_USER_ID:?set UGOITE_DEV_USER_ID}
      - UGOITE_DEV_SIGNING_KID=${UGOITE_DEV_SIGNING_KID:-release-compose-local-v1}
      - UGOITE_DEV_SIGNING_SECRET=${UGOITE_DEV_SIGNING_SECRET:?set UGOITE_DEV_SIGNING_SECRET}
      - UGOITE_AUTH_BEARER_SECRETS=${UGOITE_AUTH_BEARER_SECRETS:?set UGOITE_AUTH_BEARER_SECRETS}
      - UGOITE_AUTH_BEARER_ACTIVE_KIDS=${UGOITE_AUTH_BEARER_ACTIVE_KIDS:-release-compose-local-v1}
      - UGOITE_DEV_AUTH_PROXY_TOKEN=${UGOITE_DEV_AUTH_PROXY_TOKEN:?set UGOITE_DEV_AUTH_PROXY_TOKEN}

  frontend:
    image: ghcr.io/ugoite/ugoite/frontend:${UGOITE_VERSION:?set UGOITE_VERSION}
    ports:
      - "127.0.0.1:${UGOITE_FRONTEND_PORT:-3000}:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - UGOITE_DEV_AUTH_PROXY_TOKEN=${UGOITE_DEV_AUTH_PROXY_TOKEN:?set UGOITE_DEV_AUTH_PROXY_TOKEN}
    depends_on:
      - backend
