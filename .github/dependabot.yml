version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"

  - package-ecosystem: "bun"
    directory: "/frontend"
    schedule:
      interval: "daily"

  - package-ecosystem: "bun"
    directory: "/docsite"
    schedule:
      interval: "daily"

  - package-ecosystem: "npm"
    directory: "/e2e"
    schedule:
      interval: "daily"

  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "daily"

  - package-ecosystem: "uv"
    directory: "/ugoite-cli"
    schedule:
      interval: "daily"

  - package-ecosystem: "uv"
    directory: "/ugoite-core"
    schedule:
      interval: "daily"

  - package-ecosystem: "cargo"
    directory: "/ugoite-core"
    schedule:
      interval: "daily"
    groups:
      rust-arrow-stack:
        patterns:
          - "arrow-*"
          - "parquet"
          - "iceberg"
    ignore:
      - dependency-name: "arrow-array"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "arrow-schema"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "parquet"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "iceberg"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "daily"

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "daily"
