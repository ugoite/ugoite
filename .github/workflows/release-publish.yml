name: Release Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer version (stable or prerelease)"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: true
        type: choice
        options:
          - stable
          - alpha
          - beta
      target:
        description: "Git ref (branch, tag, or SHA) to release"
        required: true
        default: main
        type: string
      approval:
        description: "Type APPROVED after human review"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  validate:
    name: Human-verified release gate
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Validate manual approval and version
        env:
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
          APPROVAL: ${{ inputs.approval }}
        run: |
          set -euo pipefail
          if [ "$APPROVAL" != "APPROVED" ]; then
            echo "approval must be exactly APPROVED after human review." >&2
            exit 1
          fi

          case "$CHANNEL" in
            stable)
              pattern='^[0-9]+\.[0-9]+\.[0-9]+$'
              ;;
            alpha)
              pattern='^[0-9]+\.[0-9]+\.[0-9]+-alpha\.[0-9]+$'
              ;;
            beta)
              pattern='^[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$'
              ;;
            *)
              echo "unsupported channel: $CHANNEL" >&2
              exit 1
              ;;
          esac

          if ! printf '%s' "$VERSION" | grep -Eq "$pattern"; then
            echo "version '$VERSION' does not match channel '$CHANNEL' pattern." >&2
            exit 1
          fi

  create-draft-release:
    name: Create draft release
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout requested release target
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target != '' && inputs.target || github.sha }}

      - name: Create or reuse draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          tag="v$VERSION"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Reusing existing release $tag"
            exit 0
          fi

          channel_notes="$(python3 scripts/render_release_notes.py --channel "$CHANNEL" --version "$VERSION")"
          args=(--target "$TARGET" --title "$tag" --generate-notes --draft --notes "$channel_notes")
          if [ "$CHANNEL" != "stable" ]; then
            args+=(--prerelease)
          fi
          gh release create "$tag" "${args[@]}"

  publish-images:
    name: Publish release images
    needs: validate
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-images.yml
    with:
      push: true
      target: ${{ inputs.target }}
      version: ${{ inputs.version }}
      channel: ${{ inputs.channel }}

  export-release-image-archives:
    name: Export release image archives
    needs: validate
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-images.yml
    with:
      push: false
      target: ${{ inputs.target }}
      export_artifacts: true
      artifact_name: release-docker-images
      backend_local_tag: ghcr.io/${{ github.repository }}/backend:${{ inputs.version }}
      frontend_local_tag: ghcr.io/${{ github.repository }}/frontend:${{ inputs.version }}

  publish-cli-binaries:
    name: Publish CLI binaries
    needs:
      - validate
      - create-draft-release
    permissions:
      contents: write
    uses: ./.github/workflows/cli-release-binaries.yml
    with:
      version: ${{ inputs.version }}
      target: ${{ inputs.target }}

  publish-release:
    name: Publish GitHub release
    needs:
      - validate
      - create-draft-release
      - publish-images
      - export-release-image-archives
      - publish-cli-binaries
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout requested release target
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target != '' && inputs.target || github.sha }}

      - name: Download release image archives
        uses: actions/download-artifact@v8
        with:
          name: release-docker-images
          path: exported-images

      - name: Package release container quick-start assets
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          backend_asset="ugoite-backend-v${VERSION}.docker.tar.gz"
          frontend_asset="ugoite-frontend-v${VERSION}.docker.tar.gz"
          cp docker-compose.release.yaml dist/docker-compose.release.yaml
          cp exported-images/backend-image.tar.gz "dist/${backend_asset}"
          cp exported-images/frontend-image.tar.gz "dist/${frontend_asset}"

          if command -v sha256sum >/dev/null 2>&1; then
            (
              cd dist
              sha256sum docker-compose.release.yaml > docker-compose.release.yaml.sha256
              sha256sum "${backend_asset}" > "${backend_asset}.sha256"
              sha256sum "${frontend_asset}" > "${frontend_asset}.sha256"
            )
          else
            (
              cd dist
              shasum -a 256 docker-compose.release.yaml > docker-compose.release.yaml.sha256
              shasum -a 256 "${backend_asset}" > "${backend_asset}.sha256"
              shasum -a 256 "${frontend_asset}" > "${frontend_asset}.sha256"
            )
          fi

      - name: Upload release container quick-start assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          gh release upload "v${VERSION}" \
            dist/docker-compose.release.yaml \
            dist/docker-compose.release.yaml.sha256 \
            "dist/ugoite-backend-v${VERSION}.docker.tar.gz" \
            "dist/ugoite-backend-v${VERSION}.docker.tar.gz.sha256" \
            "dist/ugoite-frontend-v${VERSION}.docker.tar.gz" \
            "dist/ugoite-frontend-v${VERSION}.docker.tar.gz.sha256" \
            --clobber

      - name: Finalize GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          gh release edit "v$VERSION" --draft=false

  verify-release-quickstart:
    name: Verify release quick start
    needs:
      - publish-release
    permissions:
      contents: read
    uses: ./.github/workflows/release-quickstart-verify.yml
    with:
      version: ${{ inputs.version }}
