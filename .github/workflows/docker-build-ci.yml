name: Docker Build CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-compose:
    name: Validate compose file
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate compose files
        run: |
          docker compose -f docker-compose.yaml config
          docker compose -f docker-compose.release.yaml config

  docker-build:
    name: Docker Build
    needs: validate-compose
    permissions:
      contents: read
    uses: ./.github/workflows/docker-images.yml
    with:
      push: false
