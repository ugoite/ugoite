name: Docker Build CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-compose:
    name: Validate compose file
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate compose files
        env:
          UGOITE_VERSION: ci-validate
        run: |
          docker compose -f docker-compose.yaml config
          docker compose -f docker-compose.release.yaml config

  docker-build:
    name: Docker Build
    needs: validate-compose
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-images.yml
    with:
      push: false

  required-check:
    name: Docker Build CI
    if: ${{ always() }}
    needs:
      - validate-compose
      - docker-build
    runs-on: ubuntu-24.04
    steps:
      - name: Check upstream job results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os

          needs = json.loads(os.environ["NEEDS_JSON"])
          failures = {
              job: data.get("result", "missing")
              for job, data in needs.items()
              if data.get("result") not in {"success", "skipped"}
          }
          if failures:
              details = ", ".join(
                  f"{job}={result}" for job, result in sorted(failures.items())
              )
              raise SystemExit(f"Required CI jobs failed or were cancelled: {details}")
          print("Required CI jobs succeeded.")
          PY
