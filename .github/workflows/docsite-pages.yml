name: Deploy Docsite to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup mise (install tools and dependencies)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Install project dependencies
        run: mise run setup

      - name: Capture CLI command outputs
        run: |
          mkdir -p docsite/src/generated
          python3 - <<'PY'
          import json
          from pathlib import Path
          import subprocess

          commands = [
              (
                  "cargo run -q -p ugoite-cli -- --help",
                  ["cargo", "run", "-q", "-p", "ugoite-cli", "--", "--help"],
              ),
              (
                  "mkdir -p ./spaces && cargo run -q -p ugoite-cli -- space list ./spaces",
                  ["cargo", "run", "-q", "-p", "ugoite-cli", "--", "space", "list", "./spaces"],
              ),
          ]
          Path("spaces").mkdir(exist_ok=True)
          results = []
          for label, argv in commands:
              proc = subprocess.run(
                  argv,
                  check=False,
                  text=True,
                  capture_output=True,
              )
              output = (proc.stdout or "") + (proc.stderr or "")
              results.append({"command": label, "output": output.strip()})
          with open("docsite/src/generated/cli-command-outputs.json", "w", encoding="utf-8") as f:
              json.dump(results, f, ensure_ascii=False, indent=2)
          PY

      - name: Capture UI screenshots
        run: mise run screenshot

      - name: Build
        working-directory: ./docsite
        run: bun run build

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: ./docsite/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
