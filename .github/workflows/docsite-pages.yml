name: Deploy Docsite to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  packages: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      CI_CONTAINER_IMAGE: ghcr.io/${{ github.repository_owner }}/ugoite-ci-tools:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Pull pre-built CI container
        run: docker pull "$CI_CONTAINER_IMAGE"

      - name: Capture CLI command outputs
        run: |
          docker run --rm --network host \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$CI_CONTAINER_IMAGE" \
            bash -lc '
              mkdir -p docsite/src/generated
              python3 - <<'"'"'PY'"'"'
          import json
          import subprocess

          commands = [
              "cd ugoite-cli && uv run ugoite --help",
              "cd ugoite-cli && uv run ugoite space list",
          ]
          results = []
          for command in commands:
              proc = subprocess.run(
                  command,
                  shell=True,
                  check=False,
                  text=True,
                  capture_output=True,
              )
              output = (proc.stdout or "") + (proc.stderr or "")
              results.append({"command": command, "output": output.strip()})
          with open("docsite/src/generated/cli-command-outputs.json", "w", encoding="utf-8") as f:
              json.dump(results, f, ensure_ascii=False, indent=2)
          PY
            '

      - name: Capture UI screenshots
        run: |
          docker run --rm --network host \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$CI_CONTAINER_IMAGE" \
            bash -lc 'mise run screenshot'

      - name: Build
        run: |
          docker run --rm --network host \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$CI_CONTAINER_IMAGE" \
            bash -lc 'cd docsite && bun run build'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docsite/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
