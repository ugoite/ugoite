name: Python CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-24.04
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/rust
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: 1.93.0

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            ugoite-minimum
            ugoite-core
            ugoite-cli

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: 0.10.10
          enable-cache: true
          cache-dependency-glob: |
            backend/uv.lock
            ugoite-core/uv.lock
            backend/pyproject.toml
            ugoite-core/pyproject.toml

      - name: Run ruff check
        # Ignore in-source `# noqa` comments to ensure they cannot silence
        # linting failures in CI. This mirrors the pre-commit behavior.
        run: uvx ruff check --select ALL --ignore-noqa .

      - name: Run ruff format check
        run: uvx ruff format --check .

      - name: Run ty check (backend)
        working-directory: ./backend
        run: uv run ty check .

      - name: Run pytest (backend)
        working-directory: ./backend
        run: uv run pytest -W error --junitxml=../backend-pytest.xml

      - name: Fail on skipped backend tests
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path("backend-pytest.xml")
          root = ET.parse(report).getroot()
          suites = [root] if root.tag == "testsuite" else list(root.findall("testsuite"))
          skipped = sum(int(float(s.attrib.get("skipped", "0") or 0)) for s in suites)
          if skipped > 0:
              raise SystemExit(f"backend tests: skipped={skipped} is not allowed")
          PY

      - name: Run docs consistency tests
        run: uv run --with pytest --with pyyaml --with bashlex pytest docs/tests -v -W error --junitxml=docs-pytest.xml

      - name: Fail on skipped docs tests
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path("docs-pytest.xml")
          root = ET.parse(report).getroot()
          suites = [root] if root.tag == "testsuite" else list(root.findall("testsuite"))
          skipped = sum(int(float(s.attrib.get("skipped", "0") or 0)) for s in suites)
          if skipped > 0:
              raise SystemExit(f"docs tests: skipped={skipped} is not allowed")
          PY

  required-check:
    name: Python CI
    if: ${{ always() }}
    needs:
      - ci
    runs-on: ubuntu-24.04
    steps:
      - name: Check upstream job results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os

          needs = json.loads(os.environ["NEEDS_JSON"])
          failures = {
              job: data.get("result", "missing")
              for job, data in needs.items()
              if data.get("result") not in {"success", "skipped"}
          }
          if failures:
              details = ", ".join(
                  f"{job}={result}" for job, result in sorted(failures.items())
              )
              raise SystemExit(f"Required CI jobs failed or were cancelled: {details}")
          print("Required CI jobs succeeded.")
          PY
