name: Pre-commit CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/rust
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shfmt shellcheck

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy, llvm-tools-preview

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ugoite-minimum
            ugoite-core
            ugoite-cli

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 0.10.10
          enable-cache: true
          cache-dependency-glob: |
            backend/uv.lock
            ugoite-core/uv.lock
            backend/pyproject.toml
            ugoite-core/pyproject.toml

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install --frozen-lockfile

      - name: Install docsite dependencies
        working-directory: ./docsite
        run: bun install --frozen-lockfile

      - name: Install backend dependencies
        working-directory: ./backend
        run: uv sync --locked

      - name: Install core dependencies
        working-directory: ./ugoite-core
        run: uv sync --locked

      - name: Install cargo-llvm-cov
        run: command -v cargo-llvm-cov >/dev/null 2>&1 || cargo install cargo-llvm-cov --locked

      - name: Run pre-commit
        run: uvx pre-commit run --all-files --show-diff-on-failure

  required-check:
    name: Pre-commit CI
    if: ${{ always() }}
    needs:
      - ci
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Check upstream job results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os

          needs = json.loads(os.environ["NEEDS_JSON"])
          failures = {
              job: data.get("result", "missing")
              for job, data in needs.items()
              if data.get("result") not in {"success", "skipped"}
          }
          if failures:
              details = ", ".join(
                  f"{job}={result}" for job, result in sorted(failures.items())
              )
              raise SystemExit(f"Required CI jobs failed or were cancelled: {details}")
          print("Required CI jobs succeeded.")
          PY
