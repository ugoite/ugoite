name: All Tests Status

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

jobs:
  all-tests-check:
    name: All Tests Check
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
    steps:
      - name: Wait for curated workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURATED_WORKFLOW_NAMES: |
            CodeQL
            Commitlint CI
            Devcontainer CI
            Docker Build CI
            Docsite CI
            E2E Tests
            Frontend CI
            Python CI
            README Command Guard
            Rust CI
            SBOM CI
            ScanCode
            Shell CI
            YAML Workflow CI
          EXCLUDED_WORKFLOW_NAMES: |
            All Tests Status
            Release CI
            Release Publish
          INITIAL_DELAY_SECONDS: "10"
          PERIOD_SECONDS: "15"
          SETTLE_POLLS_REQUIRED: "3"
        run: |
          python - <<'PYCODE'
          from __future__ import annotations

          import json
          import os
          import pathlib
          import subprocess
          import time


          def workflow_names(raw: str) -> set[str]:
              return {line.strip() for line in raw.splitlines() if line.strip()}


          def gh_json(path: str) -> dict[str, object]:
              # gh api keeps the rollup on maintained runner tooling.
              result = subprocess.run(
                  ["gh", "api", path],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              payload = json.loads(result.stdout)
              if not isinstance(payload, dict):
                  msg = "GitHub API payload must be a JSON object"
                  raise TypeError(msg)
              return payload


          def github_event_payload() -> dict[str, object]:
              event_path = pathlib.Path(os.environ["GITHUB_EVENT_PATH"])
              payload = json.loads(event_path.read_text(encoding="utf-8"))
              if not isinstance(payload, dict):
                  msg = "GitHub event payload must be a JSON object"
                  raise TypeError(msg)
              return payload


          def pull_request_head_sha(payload: dict[str, object]) -> str | None:
              pull_request = payload.get("pull_request")
              if not isinstance(pull_request, dict):
                  return None
              head = pull_request.get("head")
              if not isinstance(head, dict):
                  return None
              sha = head.get("sha")
              if not isinstance(sha, str):
                  return None
              normalized = sha.strip()
              return normalized or None


          def merge_group_head_sha(payload: dict[str, object]) -> str | None:
              merge_group = payload.get("merge_group")
              if not isinstance(merge_group, dict):
                  return None
              sha = merge_group.get("head_sha")
              if not isinstance(sha, str):
                  return None
              normalized = sha.strip()
              return normalized or None


          def target_sha(event: str, payload: dict[str, object], default_sha: str) -> str:
              if event == "pull_request":
                  return pull_request_head_sha(payload) or default_sha
              if event == "merge_group":
                  return merge_group_head_sha(payload) or default_sha
              return default_sha


          curated = workflow_names(os.environ["CURATED_WORKFLOW_NAMES"])
          excluded = workflow_names(os.environ["EXCLUDED_WORKFLOW_NAMES"])
          repo = os.environ["GITHUB_REPOSITORY"]
          default_sha = os.environ["GITHUB_SHA"]
          event = os.environ["GITHUB_EVENT_NAME"]
          current_run_id = int(os.environ["GITHUB_RUN_ID"])
          initial_delay = int(os.environ["INITIAL_DELAY_SECONDS"])
          period = int(os.environ["PERIOD_SECONDS"])
          settle_polls_required = int(os.environ["SETTLE_POLLS_REQUIRED"])
          payload = github_event_payload()
          sha = target_sha(event, payload, default_sha)
          deadline = time.time() + (55 * 60)
          allowed_conclusions = {"neutral", "skipped", "success"}
          stable_polls = 0
          observed_names: set[str] = set()

          print(f"Target commit: {sha}")
          print(f"Filtering workflows by event: {event}")
          print("Curated workflows:", ", ".join(sorted(curated)))
          print("Excluded workflows:", ", ".join(sorted(excluded)))
          time.sleep(initial_delay)

          while True:
              payload = gh_json(
                  f"/repos/{repo}/actions/runs?head_sha={sha}&event={event}&per_page=100",
              )
              runs = payload.get("workflow_runs", [])
              if not isinstance(runs, list):
                  msg = "workflow_runs must be a list"
                  raise TypeError(msg)

              latest_by_name: dict[str, dict[str, object]] = {}
              for run in runs:
                  if not isinstance(run, dict):
                      continue
                  name = str(run.get("name", "")).strip()
                  if not name or name in excluded or name not in curated:
                      continue
                  if int(run.get("id", 0) or 0) == current_run_id:
                      continue
                  created_at = str(run.get("created_at", ""))
                  existing = latest_by_name.get(name)
                  if existing is None or created_at > str(existing.get("created_at", "")):
                      latest_by_name[name] = run

              if not latest_by_name:
                  if time.time() > deadline:
                      raise SystemExit("Timed out waiting for curated workflows to appear")
                  print("No curated workflow runs found yet; waiting...")
                  time.sleep(period)
                  continue

              failures: list[str] = []
              pending: list[str] = []
              current_names = set(latest_by_name)
              newly_observed = sorted(current_names.difference(observed_names))
              if newly_observed:
                  observed_names.update(newly_observed)
                  stable_polls = 0
                  print("New curated workflows observed:", ", ".join(newly_observed))

              print(f"Current curated workflow runs: {len(latest_by_name)}")
              for name in sorted(latest_by_name):
                  run = latest_by_name[name]
                  status = str(run.get("status", ""))
                  conclusion = str(run.get("conclusion", ""))
                  url = str(run.get("html_url", ""))
                  print(f"- {name}: status={status} conclusion={conclusion} url={url}")
                  if status != "completed":
                      pending.append(name)
                  elif conclusion not in allowed_conclusions:
                      failures.append(name)

              if failures:
                  raise SystemExit(
                      "Curated workflow failures detected: "
                      + ", ".join(sorted(failures)),
                  )
              if pending:
                  stable_polls = 0
                  if time.time() > deadline:
                      raise SystemExit(
                          "Timed out waiting for curated workflows: "
                          + ", ".join(sorted(pending)),
                      )
                  time.sleep(period)
                  continue

              stable_polls += 1
              print(
                  "Observed curated workflow set stable for "
                  f"{stable_polls}/{settle_polls_required} poll(s).",
              )
              if stable_polls < settle_polls_required:
                  if time.time() > deadline:
                      raise SystemExit(
                          "Timed out waiting for curated workflow set to settle",
                      )
                  time.sleep(period)
                  continue

              print("All curated workflows completed successfully.")
              break
          PYCODE
