name: ScanCode

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  merge_group:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scancode:
    name: ScanCode Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: scancode-inputs
          persist-credentials: false

      - name: Restore ScanCode caches
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/scancode
            ~/.cache/scancode-toolkit
          key: ${{ runner.os }}-scancode-${{ hashFiles('.github/workflows/scancode.yml') }}
          restore-keys: |
            ${{ runner.os }}-scancode-

      - name: Run ScanCode pipelines
        uses: aboutcode-org/scancode-action@e46d127dfbe502ad2699fbbba8efedad1b2adbd1 # beta
        with:
          project-name: "ugoite"
          inputs-path: "scancode-inputs"
          pipelines: "scan_codebase,find_vulnerabilities"
          output-formats: "json xlsx spdx cyclonedx:1.5"
          check-compliance: true
          compliance-fail-level: "ERROR"
          compliance-fail-on-vulnerabilities: true
          python-version: "3.13.12"
        env:
          VULNERABLECODE_URL: "https://public.vulnerablecode.io/"

  required-check:
    name: ScanCode
    if: ${{ always() }}
    needs:
      - scancode
    runs-on: ubuntu-24.04
    steps:
      - name: Check upstream job results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os

          needs = json.loads(os.environ["NEEDS_JSON"])
          failures = {
              job: data.get("result", "missing")
              for job, data in needs.items()
              if data.get("result") not in {"success", "skipped"}
          }
          if failures:
              details = ", ".join(
                  f"{job}={result}" for job, result in sorted(failures.items())
              )
              raise SystemExit(f"Required CI jobs failed or were cancelled: {details}")
          print("Required CI jobs succeeded.")
          PY
