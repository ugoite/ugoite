name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-images:
    name: Build Docker images
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-images.yml
    with:
      push: false
      export_artifacts: true
      artifact_name: e2e-docker-images
      backend_local_tag: ugoite-backend:e2e
      frontend_local_tag: ugoite-frontend:e2e

  select-tier:
    name: Select E2E tier
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      test_type: ${{ steps.select.outputs.test_type }}
      selection_reason: ${{ steps.select.outputs.selection_reason }}
    steps:
      - name: Checkout PR history
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Select E2E tier
        id: select
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          from __future__ import annotations
          import fnmatch
          import os
          import subprocess
          from pathlib import PurePosixPath

          event_name = os.environ["EVENT_NAME"]
          if event_name in {"merge_group", "push"}:
              test_type = "full"
              selection_reason = f"{event_name} requires full E2E coverage"
          else:
              base_sha = os.environ["PR_BASE_SHA"].strip()
              head_sha = os.environ["HEAD_SHA"].strip()
              if not base_sha or not head_sha:
                  raise SystemExit("pull_request tiering requires PR_BASE_SHA and HEAD_SHA")

              raw = subprocess.check_output(
                  ["git", "diff", "--name-only", f"{base_sha}...{head_sha}"],
                  text=True,
              )
              changed_files = [line.strip() for line in raw.splitlines() if line.strip()]
              smoke_only_patterns = (
                  "README.md",
                  "LICENSE",
                  "AGENTS.md",
                  "docs/**",
                  "docsite/**",
                  ".github/ISSUE_TEMPLATE/**",
              )

              def is_smoke_only(path: str) -> bool:
                  candidate = PurePosixPath(path)
                  return any(
                      fnmatch.fnmatch(path, pattern) or candidate.match(pattern)
                      for pattern in smoke_only_patterns
                  )

              if changed_files and all(is_smoke_only(path) for path in changed_files):
                  test_type = "smoke"
                  selection_reason = "docs/docsite-only pull request"
              else:
                  test_type = "full"
                  selection_reason = "application or workflow inputs changed"

          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as handle:
              handle.write(f"test_type={test_type}\n")
              handle.write(f"selection_reason={selection_reason}\n")
          print(f"Selected E2E tier: {test_type} ({selection_reason})")
          PY

  e2e:
    needs:
      - build-images
      - select-tier
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Restore Playwright and e2e node cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/ms-playwright
            e2e/node_modules
          key: ${{ runner.os }}-e2e-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-e2e-

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download Docker image archives
        uses: actions/download-artifact@v4
        with:
          name: e2e-docker-images
          path: exported-images

      - name: Load Docker images
        run: |
          set -euo pipefail
          gzip -dc exported-images/backend-image.tar.gz | docker load
          gzip -dc exported-images/frontend-image.tar.gz | docker load

      - name: Announce selected E2E tier
        run: |
          echo "Selected tier: ${{ needs.select-tier.outputs.test_type }}"
          echo "Reason: ${{ needs.select-tier.outputs.selection_reason }}"

      - name: Install docsite dependencies
        working-directory: ./docsite
        run: bun install --frozen-lockfile

      - name: Install e2e dependencies
        working-directory: ./e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          E2E_BUILD_IMAGES: "false"
          PLAYWRIGHT_CI_REPORTER: junit
          PLAYWRIGHT_JUNIT_OUTPUT_FILE: test-results/junit.xml
        run: bash e2e/scripts/run-e2e-compose.sh "${{ needs.select-tier.outputs.test_type }}"

  required-check:
    name: E2E Tests
    if: ${{ always() }}
    needs:
      - build-images
      - select-tier
      - e2e
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Check upstream job results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os

          needs = json.loads(os.environ["NEEDS_JSON"])
          failures = {
              job: data.get("result", "missing")
              for job, data in needs.items()
              if data.get("result") not in {"success", "skipped"}
          }
          if failures:
              details = ", ".join(
                  f"{job}={result}" for job, result in sorted(failures.items())
              )
              raise SystemExit(f"Required CI jobs failed or were cancelled: {details}")
          print("Required CI jobs succeeded.")
          PY
