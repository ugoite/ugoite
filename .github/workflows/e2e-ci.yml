name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

jobs:
  build-images:
    name: Build Docker images
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-images.yml
    with:
      push: false
      export_artifacts: true
      artifact_name: e2e-docker-images
      backend_local_tag: ugoite-backend:e2e
      frontend_local_tag: ugoite-frontend:e2e

  e2e:
    needs: build-images
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Restore Playwright and e2e node cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/ms-playwright
            e2e/node_modules
          key: ${{ runner.os }}-e2e-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-e2e-

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download Docker image archives
        uses: actions/download-artifact@v4
        with:
          name: e2e-docker-images
          path: exported-images

      - name: Load Docker images
        run: |
          set -euo pipefail
          gzip -dc exported-images/backend-image.tar.gz | docker load
          gzip -dc exported-images/frontend-image.tar.gz | docker load

      - name: Install docsite dependencies
        working-directory: ./docsite
        run: bun install --frozen-lockfile

      - name: Install e2e dependencies
        working-directory: ./e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          PLAYWRIGHT_CI_REPORTER: junit
          PLAYWRIGHT_JUNIT_OUTPUT_FILE: test-results/junit.xml
        run: bash e2e/scripts/run-e2e-compose.sh

      - name: Fail on skipped e2e tests
        run: |
          python3 - <<'PY'
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path("e2e/test-results/junit.xml")
          if not report.exists():
            raise SystemExit(f"missing junit report: {report}")

          root = ET.parse(report).getroot()
          suites = [root] if root.tag == "testsuite" else list(root.findall("testsuite"))
          skipped = sum(int(float(s.attrib.get("skipped", "0") or 0)) for s in suites)
          tests = sum(int(float(s.attrib.get("tests", "0") or 0)) for s in suites)
          if tests == 0:
            raise SystemExit("e2e tests: zero executed tests")
          if skipped > 0:
            raise SystemExit(f"e2e tests: skipped={skipped} is not allowed")
          sys.stdout.write(f"e2e tests OK: tests={tests}, skipped={skipped}\n")
          PY
