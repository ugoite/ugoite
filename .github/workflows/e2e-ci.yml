name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

jobs:
  build-images:
    name: Build Docker images
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-images.yml
    with:
      push: false
      export_artifacts: true
      artifact_name: e2e-docker-images
      backend_local_tag: ugoite-backend:e2e
      frontend_local_tag: ugoite-frontend:e2e

  e2e:
    needs: build-images
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Restore Playwright and e2e node cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/ms-playwright
            e2e/node_modules
          key: ${{ runner.os }}-e2e-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-e2e-

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download Docker image archives
        uses: actions/download-artifact@v4
        with:
          name: e2e-docker-images
          path: exported-images

      - name: Load Docker images
        run: |
          set -euo pipefail
          gzip -dc exported-images/backend-image.tar.gz | docker load
          gzip -dc exported-images/frontend-image.tar.gz | docker load

      - name: Install docsite dependencies
        working-directory: ./docsite
        run: bun install --frozen-lockfile

      - name: Install e2e dependencies
        working-directory: ./e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          E2E_BUILD_IMAGES: "false"
          PLAYWRIGHT_CI_REPORTER: junit
          PLAYWRIGHT_JUNIT_OUTPUT_FILE: test-results/junit.xml
        run: bash e2e/scripts/run-e2e-compose.sh full
