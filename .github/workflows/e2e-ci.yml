name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Restore Playwright and e2e node cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/ms-playwright
            e2e/node_modules
          key: ${{ runner.os }}-e2e-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-e2e-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (from docker-build-ci cache)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: ugoite-backend:e2e
          cache-from: |
            type=gha,scope=backend-image
            type=gha,scope=docker-build-common
          build-contexts: |
            core=./ugoite-core
            module=./ugoite-cli

      - name: Build frontend image (from docker-build-ci cache)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: ugoite-frontend:e2e
          cache-from: |
            type=gha,scope=frontend-image
            type=gha,scope=docker-build-common
          build-contexts: |
            shared=./shared

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install docsite dependencies
        working-directory: ./docsite
        run: bun install --frozen-lockfile

      - name: Install e2e dependencies
        working-directory: ./e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          PLAYWRIGHT_CI_REPORTER: junit
          PLAYWRIGHT_JUNIT_OUTPUT_FILE: test-results/junit.xml
        run: bash e2e/scripts/run-e2e-compose.sh

      - name: Fail on skipped e2e tests
        run: |
          python3 - <<'PY'
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path("e2e/test-results/junit.xml")
          if not report.exists():
            raise SystemExit(f"missing junit report: {report}")

          root = ET.parse(report).getroot()
          suites = [root] if root.tag == "testsuite" else list(root.findall("testsuite"))
          skipped = sum(int(float(s.attrib.get("skipped", "0") or 0)) for s in suites)
          tests = sum(int(float(s.attrib.get("tests", "0") or 0)) for s in suites)
          if tests == 0:
            raise SystemExit("e2e tests: zero executed tests")
          if skipped > 0:
            raise SystemExit(f"e2e tests: skipped={skipped} is not allowed")
          sys.stdout.write(f"e2e tests OK: tests={tests}, skipped={skipped}\n")
          PY
