name: README Command Guard

on:
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Validate key commands in README
        run: |
          set -euo pipefail
          required=(
            "mise run setup"
            "mise run dev"
            "uv run uvicorn src.app.main:app --reload --host 0.0.0.0 --port 8000"
            "bun dev"
          )

          for cmd in "${required[@]}"; do
            if ! grep -Fq "$cmd" README.md; then
              echo "Missing README command: $cmd"
              exit 1
            fi
          done

          echo "README command guard passed"

  required-check:
    name: README Command Guard
    if: ${{ always() }}
    needs:
      - guard
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Check upstream job results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os

          needs = json.loads(os.environ["NEEDS_JSON"])
          failures = {
              job: data.get("result", "missing")
              for job, data in needs.items()
              if data.get("result") not in {"success", "skipped"}
          }
          if failures:
              details = ", ".join(
                  f"{job}={result}" for job, result in sorted(failures.items())
              )
              raise SystemExit(f"Required CI jobs failed or were cancelled: {details}")
          print("Required CI jobs succeeded.")
          PY
