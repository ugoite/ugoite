name: Rust CI

on:
  push:
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-24.04
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/rust
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy, llvm-tools-preview

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ugoite-minimum
            ugoite-core
            ugoite-cli

      - name: Run rustfmt check (minimum)
        working-directory: ./ugoite-minimum
        run: cargo fmt --check

      - name: Run clippy (minimum)
        working-directory: ./ugoite-minimum
        run: cargo clippy -- -D warnings

      - name: Run tests (minimum)
        working-directory: ./ugoite-minimum
        run: cargo test

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            ugoite-core/uv.lock
            ugoite-core/pyproject.toml

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@0adbae4d29359521325013e359f3079a4539f48a # cargo-llvm-cov

      - name: Run ty check (core)
        working-directory: ./ugoite-core
        run: uv run ty check .

      - name: Run rustfmt check (core)
        working-directory: ./ugoite-core
        run: cargo fmt --check

      - name: Run clippy (core)
        working-directory: ./ugoite-core
        run: cargo clippy -- -D warnings

      - name: Prebuild core test artifacts
        working-directory: ./ugoite-core
        run: cargo test --no-run

      - name: Build core (maturin)
        working-directory: ./ugoite-core
        run: uv run maturin develop

      - name: Run pytest (core)
        working-directory: ./ugoite-core
        run: uv run pytest -W error --junitxml=../core-pytest.xml

      - name: Fail on skipped core tests
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path("core-pytest.xml")
          root = ET.parse(report).getroot()
          suites = [root] if root.tag == "testsuite" else list(root.findall("testsuite"))
          skipped = sum(int(float(s.attrib.get("skipped", "0") or 0)) for s in suites)
          if skipped > 0:
              raise SystemExit(f"ugoite-core tests: skipped={skipped} is not allowed")
          PY

      - name: Enforce Rust coverage floor (core)
        working-directory: ./ugoite-core
        run: cargo llvm-cov --summary-only --fail-under-lines 45

      - name: Run rustfmt check (cli)
        working-directory: ./ugoite-cli
        run: cargo fmt --check

      - name: Run clippy (cli)
        working-directory: ./ugoite-cli
        run: cargo clippy --no-default-features -- -D warnings

      - name: Enforce Rust coverage floor (cli)
        working-directory: ./ugoite-cli
        env:
          CARGO_INCREMENTAL: 0
          CARGO_PROFILE_DEV_DEBUG: 0
          CARGO_PROFILE_TEST_DEBUG: 0
          CARGO_BUILD_JOBS: 1
          RUSTFLAGS: -C debuginfo=0
        run: |
          cargo clean -p ugoite-cli
          cargo llvm-cov clean --workspace
          cargo llvm-cov --summary-only --fail-under-lines 100 --no-default-features --jobs 1 || {
            cargo llvm-cov report --text --show-missing-lines
            exit 1
          }
