name: Rust CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-24.04
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/rust
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy, llvm-tools-preview

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            ugoite-minimum
            ugoite-core
            ugoite-cli

      - name: Run rustfmt check (minimum)
        working-directory: ./ugoite-minimum
        run: cargo fmt --check

      - name: Run clippy (minimum)
        working-directory: ./ugoite-minimum
        run: cargo clippy -- -D warnings

      - name: Run tests (minimum)
        working-directory: ./ugoite-minimum
        run: cargo test

      - name: Install wasm32 target (minimum)
        run: rustup target add wasm32-unknown-unknown

      - name: Build wasm32 (minimum)
        working-directory: ./ugoite-minimum
        run: cargo build --target wasm32-unknown-unknown --lib

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: 0.10.10
          enable-cache: true
          cache-dependency-glob: |
            ugoite-core/uv.lock
            ugoite-core/pyproject.toml

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@0adbae4d29359521325013e359f3079a4539f48a # cargo-llvm-cov

      - name: Enforce Rust coverage floor (minimum)
        run: python3 scripts/check_minimum_coverage.py

      - name: Run ty check (core)
        working-directory: ./ugoite-core
        run: uv run ty check .

      - name: Run rustfmt check (core)
        working-directory: ./ugoite-core
        run: cargo fmt --check

      - name: Run clippy (core)
        working-directory: ./ugoite-core
        run: cargo clippy -- -D warnings

      - name: Prebuild core test artifacts
        working-directory: ./ugoite-core
        run: cargo test --no-run

      - name: Build core (maturin)
        working-directory: ./ugoite-core
        run: uv run maturin develop

      - name: Run pytest (core)
        working-directory: ./ugoite-core
        run: uv run pytest -W error --junitxml=../core-pytest.xml

      - name: Fail on skipped core tests
        run: python3 scripts/check_pytest_no_skips.py core-pytest.xml "ugoite-core tests"

      - name: Enforce Rust coverage floor (core)
        working-directory: ./ugoite-core
        env:
          CARGO_INCREMENTAL: 0
          CARGO_PROFILE_DEV_DEBUG: 0
          CARGO_PROFILE_TEST_DEBUG: 0
          CARGO_BUILD_JOBS: 1
          RUSTFLAGS: -C debuginfo=0
        run: cargo llvm-cov --summary-only --fail-under-lines 45 --jobs 1

      - name: Run rustfmt check (cli)
        working-directory: ./ugoite-cli
        run: cargo fmt --check

      - name: Run clippy (cli)
        working-directory: ./ugoite-cli
        run: cargo clippy --no-default-features -- -D warnings

      - name: Enforce Rust coverage floor (cli)
        working-directory: ./ugoite-cli
        env:
          CARGO_INCREMENTAL: 0
          CARGO_PROFILE_DEV_DEBUG: 0
          CARGO_PROFILE_TEST_DEBUG: 0
          CARGO_BUILD_JOBS: 1
          RUSTFLAGS: -C debuginfo=0
        run: |
          cargo clean -p ugoite-cli
          cargo llvm-cov clean --workspace
          cargo llvm-cov --summary-only --fail-under-lines 100 --no-default-features --jobs 1 || {
            cargo llvm-cov report --text --show-missing-lines
            exit 1
          }

  required-check:
    name: Rust CI
    if: ${{ always() }}
    needs:
      - ci
    runs-on: ubuntu-24.04
    steps:
      - name: Check upstream job results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os

          needs = json.loads(os.environ["NEEDS_JSON"])
          failures = {
              job: data.get("result", "missing")
              for job, data in needs.items()
              if data.get("result") not in {"success", "skipped"}
          }
          if failures:
              details = ", ".join(
                  f"{job}={result}" for job, result in sorted(failures.items())
              )
              raise SystemExit(f"Required CI jobs failed or were cancelled: {details}")
          print("Required CI jobs succeeded.")
          PY
