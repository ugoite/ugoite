name: Release CI

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-pr:
    name: Release Please PR
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Print release auth path
        run: echo "release_auth_path=${{ secrets.RELEASE_PLEASE_TOKEN != '' && 'RELEASE_PLEASE_TOKEN' || 'GITHUB_TOKEN' }}"

      - name: Run release-please
        id: release_please
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          skip-github-release: true

      - name: Print release planning outputs
        run: |
          echo "release_created=${{ steps.release_please.outputs.release_created }}"
          echo "prs_created=${{ steps.release_please.outputs.prs_created }}"
