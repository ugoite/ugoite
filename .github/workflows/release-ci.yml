name: Release CI

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-pr:
    name: Release Please PR
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      RELEASE_PLEASE_ENABLED: ${{ secrets.RELEASE_PLEASE_TOKEN != '' }}
    steps:
      - name: Print release auth path
        run: echo "release_auth_path=${{ env.RELEASE_PLEASE_ENABLED == 'true' && 'RELEASE_PLEASE_TOKEN' || 'SKIP_NO_RELEASE_PLEASE_TOKEN' }}"

      - name: Run release-please
        if: ${{ env.RELEASE_PLEASE_ENABLED == 'true' }}
        id: release_please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          skip-github-release: true

      - name: Print release planning outputs
        if: ${{ env.RELEASE_PLEASE_ENABLED == 'true' }}
        run: |
          echo "release_created=${{ steps.release_please.outputs.release_created }}"
          echo "prs_created=${{ steps.release_please.outputs.prs_created }}"

      - name: Skip release-please without dedicated token
        if: ${{ env.RELEASE_PLEASE_ENABLED != 'true' }}
        run: echo "Skipping release-please because RELEASE_PLEASE_TOKEN is not configured."
