name: Docker Images

on:
  workflow_call:
    inputs:
      push:
        description: "Push images to GHCR"
        required: true
        type: boolean
      target:
        description: "Git ref (branch, tag, or SHA) to build"
        required: false
        type: string
        default: ""
      version:
        description: "Release version without the leading v"
        required: false
        type: string
        default: ""
      channel:
        description: "Release channel for publish aliases"
        required: false
        type: string
        default: ""
      export_artifacts:
        description: "Export locally tagged Docker image tarballs as artifacts"
        required: false
        type: boolean
        default: false
      artifact_name:
        description: "Artifact name for exported local images"
        required: false
        type: string
        default: ""
      backend_local_tag:
        description: "Local backend image tag to export when export_artifacts=true"
        required: false
        type: string
        default: "ugoite-backend:ci"
      frontend_local_tag:
        description: "Local frontend image tag to export when export_artifacts=true"
        required: false
        type: string
        default: "ugoite-frontend:ci"
    secrets:
      GHCR_VISIBILITY_TOKEN:
        description: "Optional token with package-admin access used to make GHCR packages public"
        required: false
      RELEASE_PLEASE_TOKEN:
        description: "Optional release automation token used as a fallback for GHCR visibility updates"
        required: false

jobs:
  docker-images-ci:
    name: Docker images (CI)
    if: ${{ inputs.push == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target != '' && inputs.target || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image for CI
        if: ${{ inputs.export_artifacts == false }}
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          cache-from: |
            type=gha,scope=backend-image
            type=gha,scope=docker-build-common
          cache-to: |
            type=gha,mode=max,scope=backend-image
            type=gha,mode=max,scope=docker-build-common
          build-contexts: |
            core=./ugoite-core
            minimum=./ugoite-minimum
            module=./ugoite-cli

      - name: Build backend image for artifact export
        if: ${{ inputs.export_artifacts }}
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: ${{ inputs.backend_local_tag }}
          cache-from: |
            type=gha,scope=backend-image
            type=gha,scope=docker-build-common
          cache-to: |
            type=gha,mode=max,scope=backend-image
            type=gha,mode=max,scope=docker-build-common
          build-contexts: |
            core=./ugoite-core
            minimum=./ugoite-minimum
            module=./ugoite-cli

      - name: Build frontend image for CI
        if: ${{ inputs.export_artifacts == false }}
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          cache-from: |
            type=gha,scope=frontend-image
            type=gha,scope=docker-build-common
          cache-to: |
            type=gha,mode=max,scope=frontend-image
            type=gha,mode=max,scope=docker-build-common
          build-contexts: |
            shared=./shared

      - name: Build frontend image for artifact export
        if: ${{ inputs.export_artifacts }}
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: ${{ inputs.frontend_local_tag }}
          cache-from: |
            type=gha,scope=frontend-image
            type=gha,scope=docker-build-common
          cache-to: |
            type=gha,mode=max,scope=frontend-image
            type=gha,mode=max,scope=docker-build-common
          build-contexts: |
            shared=./shared

      - name: Export local Docker image archives
        if: ${{ inputs.export_artifacts }}
        env:
          ARTIFACT_NAME: ${{ inputs.artifact_name }}
          BACKEND_LOCAL_TAG: ${{ inputs.backend_local_tag }}
          FRONTEND_LOCAL_TAG: ${{ inputs.frontend_local_tag }}
        run: |
          set -euo pipefail
          artifact_name="${ARTIFACT_NAME:-docker-images-ci}"
          mkdir -p exported-images
          docker image save "$BACKEND_LOCAL_TAG" | gzip > exported-images/backend-image.tar.gz
          docker image save "$FRONTEND_LOCAL_TAG" | gzip > exported-images/frontend-image.tar.gz
          printf '%s\n' "$BACKEND_LOCAL_TAG" > exported-images/backend-image.tag
          printf '%s\n' "$FRONTEND_LOCAL_TAG" > exported-images/frontend-image.tag
          printf '%s\n' "$artifact_name" > exported-images/artifact-name.txt

      - name: Upload local Docker image archives
        if: ${{ inputs.export_artifacts }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name != '' && inputs.artifact_name || 'docker-images-ci' }}
          path: exported-images
          if-no-files-found: error

  docker-images-publish:
    name: Docker images
    if: ${{ inputs.push }}
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target != '' && inputs.target || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Authenticate GHCR pushes
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute backend GHCR tags
        id: backend-tags
        env:
          CHANNEL: ${{ inputs.channel }}
          IMAGE: ghcr.io/${{ github.repository }}/backend
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -z "$VERSION" ]; then
            echo "version input is required when push=true" >&2
            exit 1
          fi

          tags=("$IMAGE:$VERSION")
          case "$CHANNEL" in
            stable)
              tags+=("$IMAGE:latest" "$IMAGE:stable")
              ;;
            alpha|beta)
              tags+=("$IMAGE:$CHANNEL")
              ;;
            *)
              echo "unsupported channel: $CHANNEL" >&2
              exit 1
              ;;
          esac

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >>"$GITHUB_OUTPUT"

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.backend-tags.outputs.tags }}
          cache-from: |
            type=gha,scope=backend-image
            type=gha,scope=docker-build-common
          cache-to: |
            type=gha,mode=max,scope=backend-image
            type=gha,mode=max,scope=docker-build-common
          build-contexts: |
            core=./ugoite-core
            minimum=./ugoite-minimum
            module=./ugoite-cli

      - name: Compute frontend GHCR tags
        id: frontend-tags
        env:
          CHANNEL: ${{ inputs.channel }}
          IMAGE: ghcr.io/${{ github.repository }}/frontend
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -z "$VERSION" ]; then
            echo "version input is required when push=true" >&2
            exit 1
          fi

          tags=("$IMAGE:$VERSION")
          case "$CHANNEL" in
            stable)
              tags+=("$IMAGE:latest" "$IMAGE:stable")
              ;;
            alpha|beta)
              tags+=("$IMAGE:$CHANNEL")
              ;;
            *)
              echo "unsupported channel: $CHANNEL" >&2
              exit 1
              ;;
          esac

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >>"$GITHUB_OUTPUT"

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.frontend-tags.outputs.tags }}
          cache-from: |
            type=gha,scope=frontend-image
            type=gha,scope=docker-build-common
          cache-to: |
            type=gha,mode=max,scope=frontend-image
            type=gha,mode=max,scope=docker-build-common
          build-contexts: |
            shared=./shared

      - name: Make GHCR images public
        env:
          GHCR_OWNER: ${{ github.repository_owner }}
          GHCR_REPOSITORY: ${{ github.repository }}
          GHCR_VISIBILITY_TOKEN: ${{ secrets.GHCR_VISIBILITY_TOKEN }}
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          token="${GHCR_VISIBILITY_TOKEN:-}"
          if [ -z "$token" ]; then
            token="${RELEASE_PLEASE_TOKEN:-}"
          fi
          if [ -z "$token" ]; then
            token="${GITHUB_TOKEN:-}"
          fi
          if [ -z "$token" ]; then
            echo "A token is required to make published GHCR images anonymously pullable." >&2
            exit 1
          fi
          export GHCR_VISIBILITY_TOKEN="$token"
          package_prefix="${GHCR_REPOSITORY#*/}"
          bash scripts/set-ghcr-package-public.sh "$GHCR_OWNER" "${package_prefix}/backend"
          bash scripts/set-ghcr-package-public.sh "$GHCR_OWNER" "${package_prefix}/frontend"
