name: Docsite CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.8

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22.12.0

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.bun/install/cache
            docsite/node_modules
          key: ${{ runner.os }}-docsite-bun-${{ hashFiles('docsite/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-docsite-bun-

      - name: Install dependencies
        working-directory: ./docsite
        run: bun install --frozen-lockfile

      - name: Lint
        working-directory: ./docsite
        run: bun run lint

      - name: Format check
        working-directory: ./docsite
        run: bun run format:check

      - name: Typecheck
        working-directory: ./docsite
        run: bun run typecheck

      - name: Validation test (build)
        working-directory: ./docsite
        run: bun run test:validation

      - name: Run docsite Vitest with 100% coverage gate
        working-directory: ./docsite
        run: node ./node_modules/vitest/vitest.mjs run --coverage --maxWorkers=1

  required-check:
    name: Docsite CI
    if: ${{ always() }}
    needs:
      - ci
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Check upstream job results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os

          needs = json.loads(os.environ["NEEDS_JSON"])
          failures = {
              job: data.get("result", "missing")
              for job, data in needs.items()
              if data.get("result") not in {"success", "skipped"}
          }
          if failures:
              details = ", ".join(
                  f"{job}={result}" for job, result in sorted(failures.items())
              )
              raise SystemExit(f"Required CI jobs failed or were cancelled: {details}")
          print("Required CI jobs succeeded.")
          PY
