name: Devcontainer CI

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/devcontainer-ci.yml"
      - ".devcontainer/**"
      - "docs/tests/*.py"
      - ".pre-commit-config.yaml"
      - "mise.toml"
      - "**/mise.toml"
      - "package.json"
      - "**/package.json"
      - "package-lock.json"
      - "**/package-lock.json"
      - "Cargo.toml"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "**/Cargo.lock"
      - "**/bun.lock"
      - "**/pyproject.toml"
      - "**/uv.lock"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/devcontainer-ci.yml"
      - ".devcontainer/**"
      - "docs/tests/*.py"
      - ".pre-commit-config.yaml"
      - "mise.toml"
      - "**/mise.toml"
      - "package.json"
      - "**/package.json"
      - "package-lock.json"
      - "**/package-lock.json"
      - "Cargo.toml"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "**/Cargo.lock"
      - "**/bun.lock"
      - "**/pyproject.toml"
      - "**/uv.lock"
  merge_group:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  version-consistency:
    name: Tool Version Consistency Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 0.10.10
          enable-cache: true
          cache-dependency-glob: "docs/tests/*.py"

      - name: Check tool version consistency (REQ-OPS-001)
        run: >
          uv run --with pytest --with pyyaml --with bashlex
          pytest -W error docs/tests/test_guides.py::test_docs_req_ops_001_mise_versions_match_ci_pins -v

      - name: Check devcontainer trigger coverage (REQ-OPS-012)
        run: >
          uv run --with pytest --with pyyaml --with bashlex
          pytest -W error
          docs/tests/test_guides.py::test_docs_req_ops_012_devcontainer_trigger_paths_cover_inputs -v

  devcontainer-build-smoke:
    name: Devcontainer Build and Smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Authenticate GHCR pulls
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and smoke test devcontainer
        uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            gh --version
            mise --version
            bash --version | head -n 1
