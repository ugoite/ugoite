name: YAML Workflow CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Check root artifact hygiene
        run: bash scripts/check-root-artifact-hygiene.sh

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 0.10.10

      - name: Run yamllint
        run: >
          uvx --from yamllint yamllint --strict
          -d "{extends: relaxed, rules: {line-length: disable}}"
          --ignore "charts/*/templates/*.yaml"
          .

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1

  required-check:
    name: YAML Workflow CI
    if: ${{ always() }}
    needs:
      - ci
    runs-on: ubuntu-24.04
    steps:
      - name: Check upstream job results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os

          needs = json.loads(os.environ["NEEDS_JSON"])
          failures = {
              job: data.get("result", "missing")
              for job, data in needs.items()
              if data.get("result") not in {"success", "skipped"}
          }
          if failures:
              details = ", ".join(
                  f"{job}={result}" for job, result in sorted(failures.items())
              )
              raise SystemExit(f"Required CI jobs failed or were cancelled: {details}")
          print("Required CI jobs succeeded.")
          PY
