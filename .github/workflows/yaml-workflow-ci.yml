name: YAML Workflow CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check root artifact hygiene
        run: bash scripts/check-root-artifact-hygiene.sh

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: 0.10.10

      - name: Check GitHub Action SHA pins (REQ-OPS-029)
        run: >
          uv run --with pytest --with pyyaml --with bashlex
          pytest -W error
          docs/tests/test_guides.py::test_docs_req_ops_029_github_actions_are_sha_pinned_and_updatable -v

      - name: Run yamllint
        run: |
          git ls-files -- '*.yml' '*.yaml' ':(exclude)charts/*/templates/*.yaml' \
            | xargs uvx --from yamllint yamllint --strict \
              -d "{extends: relaxed, rules: {line-length: disable}}"

      - name: Run actionlint
        uses: reviewdog/action-actionlint@0d952c597ef8459f634d7145b0b044a9699e5e43 # v1

  required-check:
    name: YAML Workflow CI
    if: ${{ always() }}
    needs:
      - ci
    runs-on: ubuntu-24.04
    steps:
      - name: Check upstream job results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os

          needs = json.loads(os.environ["NEEDS_JSON"])
          failures = {
              job: data.get("result", "missing")
              for job, data in needs.items()
              if data.get("result") not in {"success", "skipped"}
          }
          if failures:
              details = ", ".join(
                  f"{job}={result}" for job, result in sorted(failures.items())
              )
              raise SystemExit(f"Required CI jobs failed or were cancelled: {details}")
          print("Required CI jobs succeeded.")
          PY
