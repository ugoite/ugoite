name: YAML Workflow CI

on:
  push:
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run yamllint
        run: >
          uvx --from yamllint yamllint --strict
          -d "{extends: relaxed, rules: {line-length: disable}}"
          .

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
