[tasks.install]
run = "bun install --frozen-lockfile"

[tasks.lint]
run = "bun run lint"

[tasks.format]
run = "bun run format"

[tasks."format:check"]
run = "bun run format:check"

[tasks.typecheck]
run = "bun run typecheck"

[tasks.check]
depends = ["lint", "format:check", "typecheck"]

[tasks.test]
run = "bun run test:run"
description = "Run docsite unit tests with Vitest"

[tasks."test:coverage"]
run = "node ./node_modules/vitest/vitest.mjs run --coverage --maxWorkers=1"
description = "Run docsite unit tests with 100% coverage enforcement"

[tasks.build]
run = "bun run build"

[tasks.dev]
run = "bun run dev"

[tasks.screenshot]
run = "bash ../e2e/scripts/run-e2e.sh screenshot"
