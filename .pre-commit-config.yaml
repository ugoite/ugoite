repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pin to a stable release tag to avoid mutable references; updated with `pre-commit autoupdate`
    rev: v0.14.10
    hooks:
      - id: ruff
        # Run ruff checks in pre-commit and select all error codes to match
        # the GitHub Actions configuration (`ruff check --select ALL .`).
        # Ignore any in-source `# noqa` directives so they cannot bypass
        # the linter; apply auto-fixes during pre-commit to correct fixable
        # issues before committing.
        args: ["--select", "ALL", "--ignore-noqa", "--fix"]
      - id: ruff-format
        # Use ruff's format hook to apply auto-formatting on commit
        # (this replaces the legacy `ruff` alias)

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        args: ["--strict", "-d", "{extends: relaxed, rules: {line-length: disable}}"]
        files: \.(yaml|yml)$

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
        files: ^\.github/workflows/.*\.(yml|yaml)$

  - repo: local
    hooks:
      - id: root-artifact-hygiene
        name: root artifact hygiene
        entry: bash scripts/check-placeholder-artifacts.sh
        language: system
        always_run: true
        pass_filenames: false

      - id: shell-quality
        name: shell quality gates
        entry: bash scripts/check-shell-quality.sh --fix
        language: system
        pass_filenames: false
        files: ^(scripts|e2e/scripts)/.*\.sh$

      - id: rustfmt
        name: rustfmt
        entry: bash -c "cd ugoite-minimum && cargo fmt --all && cd ../ugoite-core && uv run cargo fmt --all && cd ../ugoite-cli && cargo fmt --all"
        language: system
        files: ^ugoite-(minimum|core|cli)/
        pass_filenames: false

      - id: cargo-clippy-minimum
        name: cargo clippy (ugoite-minimum)
        entry: bash -c "cd ugoite-minimum && cargo clippy -- -D warnings"
        language: system
        files: ^ugoite-minimum/
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: bash -c "cd ugoite-core && uv run cargo clippy -- -D warnings"
        language: system
        files: ^ugoite-core/
        pass_filenames: false

      - id: cargo-llvm-cov-core
        name: cargo llvm-cov (ugoite-core 45%)
        entry: bash -c "cd ugoite-core && uv run cargo llvm-cov --summary-only --fail-under-lines 45 --jobs 1"
        language: system
        files: ^ugoite-core/(src/.*\.rs|tests/.*\.rs|Cargo\.toml)$
        pass_filenames: false

      - id: ty-backend
        name: "ty: backend type check"
        entry: bash -c "cd backend && uv run ty check ."
        language: system
        pass_filenames: false
        files: ^backend/

      - id: cargo-clippy-cli
        name: cargo clippy (ugoite-cli)
        entry: bash -c "cd ugoite-cli && cargo clippy --no-default-features -- -D warnings"
        language: system
        files: ^ugoite-cli/
        pass_filenames: false

      - id: cargo-test-minimum
        name: cargo test (ugoite-minimum)
        entry: bash -c "cd ugoite-minimum && cargo test"
        language: system
        files: ^ugoite-minimum/
        pass_filenames: false

      - id: cargo-test-cli
        name: cargo test (ugoite-cli)
        entry: bash -c "cd ugoite-cli && cargo test --no-default-features"
        language: system
        files: ^ugoite-cli/
        pass_filenames: false

      - id: pytest-backend
        name: pytest (backend, 100% coverage)
        entry: bash -c "cd backend && uv run pytest -q"
        language: system
        pass_filenames: false
        files: ^backend/

      - id: ty-core
        name: "ty: ugoite-core type check"
        entry: bash -c "cd ugoite-core && uv run ty check ."
        language: system
        pass_filenames: false
        files: ^ugoite-core/

      - id: biome-ci
        name: biome ci
        # Run biome in CI mode for linting and formatting checks on frontend code
        # This matches the GitHub Actions configuration
        entry: bash -c "cd frontend && bunx @biomejs/biome@2.3.15 ci ."
        language: system
        pass_filenames: false
        files: ^frontend/

      - id: docsite-biome-ci
        name: docsite biome ci
        entry: bash -c "cd docsite && bun run lint"
        language: system
        pass_filenames: false
        files: ^docsite/

      - id: docsite-format-check
        name: docsite format check
        entry: bash -c "cd docsite && bun run format:check"
        language: system
        pass_filenames: false
        files: ^docsite/

      - id: docsite-typecheck
        name: docsite typecheck
        entry: bash -c "cd docsite && bun run typecheck"
        language: system
        pass_filenames: false
        files: ^docsite/

      - id: docsite-validation-test
        name: docsite validation test
        entry: bash -c "cd docsite && bun run test:validation"
        language: system
        pass_filenames: false
        files: ^docsite/

      - id: frontend-vitest-coverage
        name: frontend vitest coverage (100%)
        entry: bash -c "cd frontend && bun run test:run --coverage"
        language: system
        pass_filenames: false
        files: ^frontend/
