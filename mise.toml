min_version = "2025.11.3"
experimental_monorepo_root = true

[monorepo]
config_roots = ["backend", "docsite", "e2e", "frontend", "ugoite-cli", "ugoite-core", "ugoite-minimum"]

[settings]
experimental = true

[env]
CARGO_HOME = "{{env.HOME}}/.cargo"
RUSTUP_HOME = "{{env.HOME}}/.rustup"
PYO3_USE_ABI3_FORWARD_COMPATIBILITY = "1"
UV_LINK_MODE = "copy"
BASELINE_BROWSER_MAPPING_IGNORE_OLD_DATA = "true"
BROWSERSLIST_IGNORE_OLD_DATA = "true"

[tools]
biome = "2.3.15"
bun = "1.3.8"
node = "lts"
python = "3.12"
rust = "1.93.0"
uv = "0.10.10"

[tasks.setup]
run = [
	"npm install --no-fund --no-audit",
	"mise run //backend:install",
	"mise run //docsite:install",
	"mise run //frontend:install",
	"mise run //ugoite-cli:install",
	"mise run //ugoite-core:install",
	"mise run //ugoite-minimum:install",
	"mise run //e2e:install",
]

[tasks.dev]
depends = ["//backend:dev", "//frontend:dev", "//docsite:dev"]

[tasks."dev:backend"]
description = "Run backend dev server only"
depends = ["//backend:dev"]

[tasks."dev:frontend"]
description = "Run frontend dev server only"
depends = ["//frontend:dev"]

[tasks."dev:docsite"]
description = "Run docsite dev server only"
depends = ["//docsite:dev"]

[tasks.test]
run = [
	"mise run //ugoite-core:build",
	"mise run //backend:test:no-build",
	"mise run //frontend:test:coverage",
	"mise run //ugoite-cli:test",
	"mise run //ugoite-core:test:no-build",
	"mise run //ugoite-minimum:test",
	"mise run test:docs",
]
description = "Run tests for all packages (ugoite-minimum, ugoite-core, backend, frontend, ugoite-cli)"

[tasks."test:docs"]
description = "Check consistency between documentation and implementation"
run = "uv run --with pytest --with pyyaml --with bashlex pytest docs/tests -v"

[tasks.e2e]
description = "Run the authoritative E2E path (docker-compose when available, parity fallback otherwise)"
run = "bash e2e/scripts/run-e2e-parity.sh full"

[tasks.screenshot]
description = "Capture UI page screenshots for docsite with local dev servers"
run = "bash e2e/scripts/run-e2e.sh screenshot"

[tasks."e2e:smoke"]
description = "Run smoke E2E tests against local dev servers (fast, not CI parity)"
run = "bash e2e/scripts/run-e2e.sh smoke"

[tasks."e2e:entries"]
description = "Run entries E2E tests against local dev servers (fast, not CI parity)"
run = "bash e2e/scripts/run-e2e.sh entries"

[tasks."e2e:dev"]
description = "Run full E2E tests against local dev servers (fast, not CI parity)"
run = "bash e2e/scripts/run-e2e.sh full"

[tasks.seed]
description = "Seed a local development space with sample data"
run = "bash scripts/dev-seed.sh"

[tasks."seed:scenarios"]
description = "List available sample-data scenarios"
run = "CARGO_TARGET_DIR=target/rust cargo run -q -p ugoite-cli -- space sample-scenarios"

[tasks."smoke:local"]
description = "Run quick local backend/frontend smoke checks"
run = "bash scripts/local-smoke-check.sh"

[tasks."cleanup:ports"]
description = "Kill stale local dev servers on standard ports"
run = "bash scripts/cleanup-dev-ports.sh"

[tasks."cleanup:rust-targets"]
description = "Remove shared and legacy Rust target caches"
run = "bash scripts/cleanup-rust-targets.sh"
